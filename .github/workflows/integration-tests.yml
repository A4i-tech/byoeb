name: Integration Tests

on:
  workflow_call:
    inputs:
      chat-service-url:
        description: "Base URL of the deployed staging chat-app service"
        required: true
        type: string
      kb-service-url:
        description: "Base URL of the deployed staging kb-app service"
        required: true
        type: string
      image-ref:
        description: "Container image (tag) containing the integration tests"
        required: true
        type: string
      registry:
        description: "Registry hosting the container image"
        required: true
        type: string
      environment:
        description: "Target environment name"
        required: false
        default: "staging"
        type: string

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for staging readiness
        env:
          CHAT_HEALTHCHECK_URL: ${{ inputs.chat-service-url }}
          KB_HEALTHCHECK_URL: ${{ inputs.kb-service-url }}
        run: |
          set -euo pipefail
          CHAT_URL="${CHAT_HEALTHCHECK_URL%/}"
          KB_URL="${KB_HEALTHCHECK_URL%/}"
          for attempt in {1..30}; do
            if curl -sSf -o /dev/null "$CHAT_URL/" && curl -sSf -o /dev/null "$KB_URL/"; then
              exit 0
            fi
            echo "Waiting for staging... ($attempt/30)"
            sleep 10
          done
          echo "Staging service failed to respond within expected time" >&2
          exit 1

      - name: Log into registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run integration tests
        id: run-tests
        continue-on-error: true
        env:
          CHAT_SERVICE_URL: ${{ inputs.chat-service-url }}
          KB_SERVICE_URL: ${{ inputs.kb-service-url }}
          USER_NAME: ${{ secrets.USERNAME }}
          PHONE_NUMBER_ID: ${{ secrets.PHONE_NUMBER }}
        run: |
          set -o pipefail
          docker run --rm \
            -e CHAT_SERVICE_URL="$CHAT_SERVICE_URL" \
            -e KB_SERVICE_URL="$KB_SERVICE_URL" \
            -e USER_NAME="$USER_NAME" \
            -e PHONE_NUMBER_ID="$PHONE_NUMBER_ID" \
            "${{ inputs.image-ref }}" \
            poetry run pytest tests/integration

      - name: Fail if tests failed
        if: ${{ steps.run-tests.outcome != 'success' }}
        run: |
          echo "Integration tests failed"
          exit 1

      - name: Notify Teams of integration test failure
        if: ${{ failure() }}
        uses: ./.github/actions/dispatch-teams-webhook
        with:
          summary: '❌ Pipeline Stage Failed'
          activity-title: '❌ Pipeline Stage Failed'
          theme-color: 'FF0000'
          facts: |
            [
              {
                "name": "Stage",
                "value": "Integration Tests"
              }
            ]
          teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}

      - name: Notify Teams of workflow success (staging)
        if: ${{ success() }}
        uses: ./.github/actions/dispatch-teams-webhook
        with:
          summary: '✅ Workflow Complete'
          activity-title: '✅ Workflow Complete'
          theme-color: '00FF00'
          facts: |
            [
              { "name": "Stage", "value": "Workflow Complete" },
              { "name": "Environment", "value": "${{ inputs.environment }}" },
              { "name": "Deployment (chat-app)", "value": "${{ inputs.chat-service-url }}" },
              { "name": "Deployment (kb-app)", "value": "${{ inputs.kb-service-url }}" }
            ]
          teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
