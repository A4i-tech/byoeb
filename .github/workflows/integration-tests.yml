name: Integration Tests

on:
  workflow_call:
    inputs:
      service-url:
        description: "Base URL of the deployed staging service"
        required: true
        type: string
      image-ref:
        description: "Container image (tag) containing the integration tests"
        required: true
        type: string
      registry:
        description: "Registry hosting the container image"
        required: true
        type: string
      environment:
        description: "Target environment name"
        required: false
        default: "staging"
        type: string
      deployment-url:
        description: "URL of the deployed service"
        required: false
        default: ""
        type: string

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for staging readiness
        env:
          HEALTHCHECK_URL: ${{ inputs.service-url }}
        run: |
          set -euo pipefail
          URL="${HEALTHCHECK_URL%/}"
          for attempt in {1..30}; do
            if curl -sSf -o /dev/null "$URL/"; then
              exit 0
            fi
            echo "Waiting for staging... ($attempt/30)"
            sleep 10
          done
          echo "Staging service failed to respond within expected time" >&2
          exit 1

      - name: Log into registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run integration tests
        id: run-tests
        continue-on-error: true
        env:
          INTEGRATION_BASE_URL: ${{ inputs.service-url }}
          INTEGRATION_AUTH_TENANT_ID: ${{ vars.INTEGRATION_AUTH_TENANT_ID }}
          INTEGRATION_AUTH_USERNAME: ${{ vars.INTEGRATION_AUTH_USERNAME }}
          INTEGRATION_AUTH_PASSWORD: ${{ secrets.INTEGRATION_AUTH_PASSWORD }}
          INTEGRATION_WHATSAPP_PHONE_NUMBER_ID: ${{ vars.INTEGRATION_WHATSAPP_PHONE_NUMBER_ID }}
          INTEGRATION_WHATSAPP_APP_SECRET: ${{ secrets.INTEGRATION_WHATSAPP_APP_SECRET }}
          MONGO_DB_CONNECTION_STRING: ${{ secrets.MONGO_DB_CONNECTION_STRING }}
        run: |
          set -o pipefail
          docker run --rm \
            -e INTEGRATION_BASE_URL="$INTEGRATION_BASE_URL" \
            -e INTEGRATION_AUTH_TENANT_ID="$INTEGRATION_AUTH_TENANT_ID" \
            -e INTEGRATION_AUTH_USERNAME="$INTEGRATION_AUTH_USERNAME" \
            -e INTEGRATION_AUTH_PASSWORD="$INTEGRATION_AUTH_PASSWORD" \
            -e INTEGRATION_WHATSAPP_PHONE_NUMBER_ID="$INTEGRATION_WHATSAPP_PHONE_NUMBER_ID" \
            -e INTEGRATION_WHATSAPP_APP_SECRET="$INTEGRATION_WHATSAPP_APP_SECRET" \
            -e MONGO_DB_CONNECTION_STRING="$MONGO_DB_CONNECTION_STRING" \
            "${{ inputs.image-ref }}" \
            poetry run pytest tests/integration

      - name: Set up Python and run release QA benchmark (from repo)
        id: run-benchmark
        env:
          INTEGRATION_BASE_URL: ${{ inputs.service-url }}
          INTEGRATION_AUTH_TENANT_ID: ${{ vars.INTEGRATION_AUTH_TENANT_ID }}
          INTEGRATION_AUTH_USERNAME: ${{ vars.INTEGRATION_AUTH_USERNAME }}
          INTEGRATION_AUTH_PASSWORD: ${{ secrets.INTEGRATION_AUTH_PASSWORD }}
          MONGO_DB_CONNECTION_STRING: ${{ secrets.MONGO_DB_CONNECTION_STRING }}
        run: |
          mkdir -p "$RUNNER_TEMP/benchmark"
          cd byoeb-v1/byoeb
          pip install poetry -q
          poetry install --no-root --no-interaction -q
          poetry run python byoeb/scripts/run_release_qa_benchmark.py \
            --base-url "$INTEGRATION_BASE_URL" \
            --tenant-id "$INTEGRATION_AUTH_TENANT_ID" \
            --username "$INTEGRATION_AUTH_USERNAME" \
            --password "$INTEGRATION_AUTH_PASSWORD" \
            --mcp-timeout 120 \
            --quiet \
            --output "$RUNNER_TEMP/benchmark/benchmark_results.json" || true
        continue-on-error: true

      - name: Upload release QA benchmark results
        if: ${{ always() && steps.run-benchmark.outcome != 'cancelled' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-qa-benchmark-${{ inputs.environment }}-${{ github.run_id }}
          path: ${{ runner.temp }}/benchmark/
          retention-days: 30
          if-no-files-found: ignore

      - name: Log test outcome (do not fail pipeline)
        if: ${{ steps.run-tests.outcome != 'success' }}
        run: |
          echo "Integration tests failed (pipeline not blocked — see plan)"

      # Fires when integration tests fail OR when any earlier step fails (run-tests would be skipped).
      # Benchmark failures are intentionally excluded — run-benchmark always succeeds (continue-on-error + || true).
      - name: Notify Teams of integration test failure
        if: ${{ always() && steps.run-tests.outcome != 'success' && steps.run-tests.outcome != 'cancelled' }}
        uses: ./.github/actions/dispatch-teams-webhook
        with:
          summary: '❌ Pipeline Stage Failed'
          activity-title: '❌ Pipeline Stage Failed'
          theme-color: 'FF0000'
          facts: |
            [
              {
                "name": "Stage",
                "value": "Integration Tests"
              }
            ]
          teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}

      # Only fire success when integration tests actually passed (not just the benchmark).
      - name: Notify Teams of workflow success (staging)
        if: ${{ success() && steps.run-tests.outcome == 'success' }}
        uses: ./.github/actions/dispatch-teams-webhook
        with:
          summary: '✅ Workflow Complete'
          activity-title: '✅ Workflow Complete'
          theme-color: '00FF00'
          facts: |
            [
              { "name": "Stage", "value": "Workflow Complete" },
              { "name": "Environment", "value": "${{ inputs.environment }}" },
              { "name": "Deployment", "value": "${{ inputs.deployment-url || 'N/A' }}" }
            ]
          teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
