name: Integration Tests

on:
  workflow_call:
    inputs:
      service-url:
        description: "Base URL of the deployed staging service"
        required: true
        type: string
      image-ref:
        description: "Container image (tag) containing the integration tests"
        required: true
        type: string
      registry:
        description: "Registry hosting the container image"
        required: true
        type: string
    outputs:
      passed:
        description: "Whether integration tests passed"
        value: ${{ jobs.integration-tests.outputs.tests-passed }}

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      tests-passed: ${{ steps.test-results.outputs.tests-passed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine receive endpoint
        id: receive-endpoint
        env:
          SERVICE_URL: ${{ inputs.service-url }}
        run: |
          set -euo pipefail
          if [ -z "$SERVICE_URL" ]; then
            echo "service-url input must be provided." >&2
            exit 1
          fi
          SERVICE_URL="${SERVICE_URL%/}"
          printf 'url=%s/receive\n' "$SERVICE_URL" >> "$GITHUB_OUTPUT"

      - name: Wait for staging readiness
        env:
          HEALTHCHECK_URL: ${{ inputs.service-url }}
        run: |
          set -euo pipefail
          URL="${HEALTHCHECK_URL%/}"
          for attempt in {1..30}; do
            if curl -sSf -o /dev/null "$URL/"; then
              exit 0
            fi
            echo "Waiting for staging... ($attempt/30)"
            sleep 10
          done
          echo "Staging service failed to respond within expected time" >&2
          exit 1

      - name: Log into registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run integration tests
        id: run-tests
        continue-on-error: true
        env:
          RECIEVE_URL: ${{ steps.receive-endpoint.outputs.url }}
          USER_NAME: ${{ secrets.USERNAME }}
          PHONE_NUMBER_ID: ${{ secrets.PHONE_NUMBER }}
        run: |
          set -o pipefail
          docker run --rm \
            -e RECIEVE_URL="$RECIEVE_URL" \
            -e USER_NAME="$USER_NAME" \
            -e PHONE_NUMBER_ID="$PHONE_NUMBER_ID" \
            "${{ inputs.image-ref }}" \
            poetry run pytest tests/integration

      - name: Record test result
        id: test-results
        if: ${{ always() }}
        env:
          TEST_OUTCOME: ${{ steps.run-tests.outcome }}
        run: |
          if [ "$TEST_OUTCOME" = "success" ]; then
            echo "tests-passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "tests-passed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail if tests failed
        if: ${{ steps.run-tests.outcome != 'success' }}
        run: |
          echo "Integration tests failed"
          exit 1
