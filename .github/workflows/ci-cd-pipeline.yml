name: CI/CD Pipeline

on:
  push:
    branches: [ "a4i/main", "staging" ]
  pull_request:
    branches: [ "a4i/main", "staging" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Step 1: Build (validates Dockerfile - uses Docker layer caching for fast builds)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image-name
        run: |
          echo "image_name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validation only, no push)
        uses: docker/build-push-action@v5
        with:
          context: ./byoeb-v1/byoeb/
          file: ./byoeb-v1/byoeb/Dockerfile
          push: false
          tags: ${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name }}:build-validation
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify-build-failure:
    needs: build
    if: ${{ always() && needs.build.result == 'failure' && github.event_name != 'pull_request' }}
    uses: ./.github/workflows/dispatch-teams-webhook.yml
    secrets: inherit
    with:
      summary: '❌ Pipeline Stage Failed'
      activity_title: '❌ Pipeline Stage Failed'
      theme_color: 'FF0000'
      stage: 'Build'
      include_actor: true
      actor_label: 'Triggered by'

  # Step 2: Run unit tests and integration tests
  unit-tests:
    needs: build
    uses: ./.github/workflows/unit-tests.yml
    secrets: inherit

  integration-tests:
    needs: [publish-staging-image, deploy-staging]
    if: needs.deploy-staging.result == 'success'
    uses: ./.github/workflows/integration-tests.yml
    with:
      service-url: ${{ needs.deploy-staging.outputs.service_url }}
      image-ref: ${{ needs.publish-staging-image.outputs.image-ref }}
      registry: ${{ needs.publish-staging-image.outputs.registry }}
    secrets: inherit

  notify-unit-tests-failure:
    needs: unit-tests
    if: ${{ always() && github.event_name == 'push' && needs.unit-tests.outputs.passed == 'false' }}
    uses: ./.github/workflows/dispatch-teams-webhook.yml
    secrets: inherit
    with:
      summary: '❌ Pipeline Stage Failed'
      activity_title: '❌ Pipeline Stage Failed'
      theme_color: 'FF0000'
      stage: 'Unit Tests'

  notify-integration-tests-failure:
    needs: integration-tests
    if: ${{ always() && github.event_name == 'push' && needs.integration-tests.result != 'skipped' && needs.integration-tests.outputs.passed == 'false' }}
    uses: ./.github/workflows/dispatch-teams-webhook.yml
    secrets: inherit
    with:
      summary: '❌ Pipeline Stage Failed'
      activity_title: '❌ Pipeline Stage Failed'
      theme_color: 'FF0000'
      stage: 'Integration Tests'

  # Step 4: Publish Staging Docker Image (only if tests passed)
  # Uses Docker layer caching from build step for fast builds
  publish-staging-image:
    needs: unit-tests
    if: success() && needs.unit-tests.outputs.passed == 'true' && github.event_name == 'push' && github.ref_name == 'staging'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-ref: ${{ steps.staging-tag.outputs.tag }}
      image-digest: ${{ steps.build.outputs.digest }}
      registry: ${{ env.REGISTRY }}
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image-name
        run: |
          echo "image_name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name }}
          tags: |
            type=raw,value=staging-{{sha}}
            type=raw,value=staging-latest

      - name: Select staging image tag
        id: staging-tag
        env:
          META_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          first="$(printf '%s\n' "$META_TAGS" | head -n 1)"
          if [ -z "$first" ]; then
            echo "Unable to determine staging tag from metadata output" >&2
            exit 1
          fi
          printf 'tag=%s\n' "$first" >> "$GITHUB_OUTPUT"

      - name: Build and push staging Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./byoeb-v1/byoeb/
          file: ./byoeb-v1/byoeb/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify-publish-staging-failure:
    needs: publish-staging-image
    if: ${{ always() && needs.publish-staging-image.result == 'failure' && github.event_name != 'pull_request' }}
    uses: ./.github/workflows/dispatch-teams-webhook.yml
    secrets: inherit
    with:
      summary: '❌ Pipeline Stage Failed'
      activity_title: '❌ Pipeline Stage Failed'
      theme_color: 'FF0000'
      stage: 'Publish Staging Image'

  # Step 5: Deploy to Render Staging
  deploy-staging:
    needs: publish-staging-image
    if: success() && needs.publish-staging-image.result == 'success'
    uses: ./.github/workflows/render-deploy.yaml
    with:
      service_id: ${{ vars.RENDER_SERVICE_ID }}
    secrets:
      render_api_key: ${{ secrets.RENDER_API_KEY }}

  notify-deploy-success:
    needs: [deploy-staging, deploy-production]
    if: ${{ always() && (needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success') }}
    uses: ./.github/workflows/dispatch-teams-webhook.yml
    secrets: inherit
    with:
      summary: '✅ Deploy Success'
      activity_title: '✅ Deploy Success'
      theme_color: '00FF00'
      stage: 'Deploy'
      environment: ${{ needs.deploy-production.result == 'success' && 'production' || (needs.deploy-staging.result == 'success' && 'staging' || 'unknown') }}
      include_commit: false

  notify-deploy-failure:
    needs: [deploy-staging, deploy-production]
    if: ${{ always() && (needs.deploy-staging.result == 'failure' || needs.deploy-production.result == 'failure') }}
    uses: ./.github/workflows/dispatch-teams-webhook.yml
    secrets: inherit
    with:
      summary: '❌ Deploy Failed'
      activity_title: '❌ Deploy Failed'
      theme_color: 'FF0000'
      stage: 'Deploy'
      environment: ${{ needs.deploy-production.result == 'failure' && 'production' || (needs.deploy-staging.result == 'failure' && 'staging' || 'unknown') }}

  # Step 6: Publish Production Docker Image (only if integration tests passed)
  publish-production-image:
    needs: [unit-tests, integration-tests]
    if: success() && needs.unit-tests.outputs.passed == 'true' && (needs.integration-tests.result == 'skipped' || needs.integration-tests.outputs.passed == 'true') && github.event_name == 'push' && github.ref_name == 'a4i/main'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.production-tag.outputs.tag }}
      image-digest: ${{ steps.build.outputs.digest }}
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image-name
        run: |
          echo "image_name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata for production
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name }}
          tags: |
            type=raw,value=production-{{sha}}
            type=raw,value=production-latest

      - name: Select production image tag
        id: production-tag
        env:
          META_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          first="$(printf '%s\n' "$META_TAGS" | head -n 1)"
          tag="${first##*:}"
          if [ -z "$tag" ]; then
            echo "Unable to parse production tag from metadata output" >&2
            exit 1
          fi
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"

      - name: Build and push production Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./byoeb-v1/byoeb/
          file: ./byoeb-v1/byoeb/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-production:
    needs: publish-production-image
    uses: ./.github/workflows/deploy-production.yml
    with:
      azure_webapp_name: ${{ vars.AZURE_WEBAPP_NAME }}
      image_tag: ${{ needs.publish-production-image.outputs['image-tag'] }}
    secrets: inherit

  notify-publish-production-failure:
    needs: publish-production-image
    if: ${{ always() && needs.publish-production-image.result == 'failure' && github.event_name != 'pull_request' }}
    uses: ./.github/workflows/dispatch-teams-webhook.yml
    secrets: inherit
    with:
      summary: '❌ Pipeline Stage Failed'
      activity_title: '❌ Pipeline Stage Failed'
      theme_color: 'FF0000'
      stage: 'Publish Production Image'
