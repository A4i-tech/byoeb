name: CI/CD Pipeline

on:
  push:
    branches: [ "a4i/main", "staging" ]
  pull_request:
    branches: [ "a4i/main", "staging" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Step 1: Run unit tests
  unit-tests:
    uses: ./.github/workflows/unit-tests.yml
    secrets: inherit

  notify-unit-tests-failure:
    needs: unit-tests
    if: ${{ always() && needs.unit-tests.result == 'failure' }}
    uses: ./.github/workflows/dispatch-teams-webhook.yml
    secrets: inherit
    with:
      summary: '❌ Pipeline Stage Failed'
      activity_title: '❌ Pipeline Stage Failed'
      theme_color: 'FF0000'
      facts: |
        [
          {
            "name": "Stage",
            "value": "Unit Tests"
          }
        ]

  # Step 2: Build (validates Dockerfile - uses Docker layer caching for fast builds)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image-name
        run: |
          echo "image_name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validation only, no push)
        uses: docker/build-push-action@v5
        with:
          context: ./byoeb-v1/byoeb/
          file: ./byoeb-v1/byoeb/Dockerfile
          push: false
          tags: ${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name }}:build-validation
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify-build-failure:
    needs: build
    if: ${{ always() && needs.build.result == 'failure' && github.event_name != 'pull_request' }}
    uses: ./.github/workflows/dispatch-teams-webhook.yml
    secrets: inherit
    with:
      summary: '❌ Pipeline Stage Failed'
      activity_title: '❌ Pipeline Stage Failed'
      theme_color: 'FF0000'
      facts: |
        [
          {
            "name": "Stage",
            "value": "Build"
          },
          {
            "name": "Actor",
            "value": "${{ github.actor }}"
          }
        ]

  # Step 4: Publish Docker Image (only if tests passed)
  publish-image:
    needs: [build, unit-tests]
    if: success() && (github.ref_name == 'staging' || github.ref_name == 'a4i/main')
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.image-info.outputs.tag }}
      image-ref: ${{ steps.image-info.outputs.ref }}
      image-digest: ${{ steps.build.outputs.digest }}
      registry: ${{ env.REGISTRY }}
      environment: ${{ steps.target.outputs.environment }}
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image-name
        run: |
          echo "image_name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Determine publish target
        id: target
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          case "$REF_NAME" in
            staging)
              echo "environment=staging" >> "$GITHUB_OUTPUT"
              echo "tag_prefix=staging" >> "$GITHUB_OUTPUT"
              ;;
            a4i/main)
              echo "environment=production" >> "$GITHUB_OUTPUT"
              echo "tag_prefix=production" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported publish target for ref: $REF_NAME" >&2
              exit 1
              ;;
          esac

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name }}
          tags: |
            type=raw,value=${{ steps.target.outputs.tag_prefix }}-{{sha}}
            type=raw,value=${{ steps.target.outputs.tag_prefix }}-latest

      - name: Capture image reference
        id: image-info
        env:
          META_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          first="$(printf '%s\n' "$META_TAGS" | head -n 1)"
          if [ -z "$first" ]; then
            echo "Unable to determine image tag from metadata output" >&2
            exit 1
          fi
          printf 'ref=%s\n' "$first" >> "$GITHUB_OUTPUT"
          printf 'tag=%s\n' "${first##*:}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./byoeb-v1/byoeb/
          file: ./byoeb-v1/byoeb/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify-publish-failure:
    needs: publish-image
    if: ${{ always() && needs.publish-image.result == 'failure' && github.event_name != 'pull_request' && (github.ref_name == 'staging' || github.ref_name == 'a4i/main') }}
    uses: ./.github/workflows/dispatch-teams-webhook.yml
    secrets: inherit
    with:
      summary: '❌ Pipeline Stage Failed'
      activity_title: '❌ Pipeline Stage Failed'
      theme_color: 'FF0000'
      facts: |
        [
          {
            "name": "Stage",
            "value": "${{ github.ref_name == 'a4i/main' && 'Publish Image (Production)' || 'Publish Image (Staging)' }}"
          },
          {
            "name": "Environment",
            "value": "${{ github.ref_name == 'a4i/main' && 'production' || 'staging' }}"
          }
        ]

  # Step 5a: Deploy staging via Render reusable workflow
  deploy-staging:
    needs: publish-image
    if: success() && needs.publish-image.outputs.environment == 'staging'
    uses: ./.github/workflows/render-deploy.yml
    with:
      service_id: ${{ vars.RENDER_SERVICE_ID }}
      api_base_url: ${{ vars.RENDER_API_URL || 'https://api.render.com' }}
    secrets:
      render_api_key: ${{ secrets.RENDER_API_KEY }}

  # Step 5b: Deploy production via reusable workflow
  deploy-production:
    needs: publish-image
    if: success() && needs.publish-image.outputs.environment == 'production'
    uses: ./.github/workflows/deploy-production.yml
    with:
      azure_webapp_name: ${{ vars.AZURE_WEBAPP_NAME }}
      image_tag: ${{ needs.publish-image.outputs['image-tag'] }}
    secrets:
      AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}

  notify-deployment-failure:
    needs: [deploy-staging, deploy-production]
    if: ${{ always() && (needs.deploy-staging.result == 'failure' || needs.deploy-production.result == 'failure') }}
    uses: ./.github/workflows/dispatch-teams-webhook.yml
    secrets: inherit
    with:
      summary: '❌ Deploy Failed'
      activity_title: '❌ Deploy Failed'
      theme_color: 'FF0000'
      facts: |
        [
          {
            "name": "Stage",
            "value": "${{ needs.deploy-production.result == 'failure' && 'Deploy (Production)' || 'Deploy (Staging)' }}"
          },
          {
            "name": "Environment",
            "value": "${{ needs.deploy-production.result == 'failure' && 'production' || 'staging' }}"
          }
        ]

  # Step 5: Run integration tests
  integration-tests:
    needs: [deploy-staging, publish-image]
    if: needs.deploy-staging.result == 'success'
    uses: ./.github/workflows/integration-tests.yml
    with:
      service-url: ${{ needs.deploy-staging.outputs.service_url }}
      image-ref: ${{ needs.publish-image.outputs['image-ref'] }}
      registry: ${{ needs.publish-image.outputs.registry }}
    secrets: inherit

  notify-integration-tests-failure:
    needs: integration-tests
    if: ${{ always() && needs.integration-tests.result == 'failure' }}
    uses: ./.github/workflows/dispatch-teams-webhook.yml
    secrets: inherit
    with:
      summary: '❌ Pipeline Stage Failed'
      activity_title: '❌ Pipeline Stage Failed'
      theme_color: 'FF0000'
      facts: |
        [
          {
            "name": "Stage",
            "value": "Integration Tests"
          }
        ]

  notify-workflow-success:
    needs: [deploy-staging, deploy-production, publish-image, integration-tests]
    if: >-
      ${{
        (
          needs.deploy-staging.result == 'success' ||
          needs.deploy-production.result == 'success'
        ) &&
        (needs.integration-tests.result == 'success' || needs.integration-tests.result == 'skipped')
      }}
    uses: ./.github/workflows/dispatch-teams-webhook.yml
    secrets: inherit
    with:
      summary: '✅ Workflow Complete'
      activity_title: '✅ Workflow Complete'
      theme_color: '00FF00'
      facts: |
        [
          { "name": "Stage", "value": "Workflow Complete" },
          { "name": "Environment", "value": "${{ needs.publish-image.outputs.environment }}" },
          { "name": "Deployment", "value": "${{ needs.deploy-staging.outputs.service_url || needs.deploy-production.outputs.service_url || 'N/A' }}" }
        ]
