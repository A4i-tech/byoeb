name: CI/CD Pipeline

on:
  push:
    branches: [ "a4i/main", "staging" ]
  pull_request:
    branches: [ "a4i/main", "staging" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Step 1: Run unit tests
  unit-tests:
    uses: ./.github/workflows/unit-tests.yml
    secrets: inherit

  notify-unit-tests-failure:
    needs: unit-tests
    if: ${{ always() && needs.unit-tests.result == 'failure' }}
    uses: ./.github/workflows/dispatch-teams-webhook.yml
    secrets: inherit
    with:
      summary: '❌ Pipeline Stage Failed'
      activity_title: '❌ Pipeline Stage Failed'
      theme_color: 'FF0000'
      stage: 'Unit Tests'

  # Step 2: Build (validates Dockerfile - uses Docker layer caching for fast builds)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image-name
        run: |
          echo "image_name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validation only, no push)
        uses: docker/build-push-action@v5
        with:
          context: ./byoeb-v1/byoeb/
          file: ./byoeb-v1/byoeb/Dockerfile
          push: false
          tags: ${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name }}:build-validation
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify-build-failure:
    needs: build
    if: ${{ always() && needs.build.result == 'failure' && github.event_name != 'pull_request' }}
    uses: ./.github/workflows/dispatch-teams-webhook.yml
    secrets: inherit
    with:
      summary: '❌ Pipeline Stage Failed'
      activity_title: '❌ Pipeline Stage Failed'
      theme_color: 'FF0000'
      stage: 'Build'
      include_actor: true
      actor_label: 'Triggered by'

  # Step 4: Publish Docker Image (only if tests passed)
  publish-image:
    needs: [build, unit-tests]
    if: success() && (github.ref_name == 'staging' || github.ref_name == 'a4i/main')
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.image-info.outputs.tag }}
      image-ref: ${{ steps.image-info.outputs.ref }}
      image-digest: ${{ steps.build.outputs.digest }}
      registry: ${{ env.REGISTRY }}
      environment: ${{ steps.target.outputs.environment }}
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image-name
        run: |
          echo "image_name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Determine publish target
        id: target
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          case "$REF_NAME" in
            staging)
              echo "environment=staging" >> "$GITHUB_OUTPUT"
              echo "tag_prefix=staging" >> "$GITHUB_OUTPUT"
              ;;
            a4i/main)
              echo "environment=production" >> "$GITHUB_OUTPUT"
              echo "tag_prefix=production" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported publish target for ref: $REF_NAME" >&2
              exit 1
              ;;
          esac

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name }}
          tags: |
            type=raw,value=${{ steps.target.outputs.tag_prefix }}-{{sha}}
            type=raw,value=${{ steps.target.outputs.tag_prefix }}-latest

      - name: Capture image reference
        id: image-info
        env:
          META_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          first="$(printf '%s\n' "$META_TAGS" | head -n 1)"
          if [ -z "$first" ]; then
            echo "Unable to determine image tag from metadata output" >&2
            exit 1
          fi
          printf 'ref=%s\n' "$first" >> "$GITHUB_OUTPUT"
          printf 'tag=%s\n' "${first##*:}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./byoeb-v1/byoeb/
          file: ./byoeb-v1/byoeb/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify-publish-failure:
    needs: publish-image
    if: ${{ always() && needs.publish-image.result == 'failure' && github.event_name != 'pull_request' && (github.ref_name == 'staging' || github.ref_name == 'a4i/main') }}
    uses: ./.github/workflows/dispatch-teams-webhook.yml
    secrets: inherit
    with:
      summary: '❌ Pipeline Stage Failed'
      activity_title: '❌ Pipeline Stage Failed'
      theme_color: 'FF0000'
      stage: ${{ github.ref_name == 'a4i/main' && 'Publish Image (Production)' || 'Publish Image (Staging)' }}

  # Step 5: Deploy image
  deploy-image:
    needs: publish-image
    if: success() && needs.publish-image.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      service_url: ${{ steps.render-service.outputs.service_url }}
      image-ref: ${{ needs.publish-image.outputs.image-ref }}
      registry: ${{ needs.publish-image.outputs.registry }}
      environment: ${{ needs.publish-image.outputs.environment }}
    env:
      TARGET_ENV: ${{ needs.publish-image.outputs.environment }}
      IMAGE_TAG: ${{ needs.publish-image.outputs['image-tag'] }}
    steps:
      - name: Announce deployment target
        run: echo "Deploying $TARGET_ENV image..."

      - name: Create Render deployment
        if: env.TARGET_ENV == 'staging'
        id: render-create
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ vars.RENDER_SERVICE_ID }}
          RENDER_API_URL: ${{ vars.RENDER_API_URL || 'https://api.render.com' }}
        run: |
          set -euo pipefail
          AUTH="Authorization: Bearer $RENDER_API_KEY"
          DEPLOY_JSON=$(curl -fsS -X POST -H "$AUTH" -H "Accept: application/json" \
            "$RENDER_API_URL/v1/services/$RENDER_SERVICE_ID/deploys" \
            -d '{}')
          echo "$DEPLOY_JSON" | jq .
          DEPLOY_ID=$(echo "$DEPLOY_JSON" | jq -r '.id')
          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"

      - name: Watch Render deployment
        if: env.TARGET_ENV == 'staging'
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ vars.RENDER_SERVICE_ID }}
          RENDER_API_URL: ${{ vars.RENDER_API_URL || 'https://api.render.com' }}
        run: |
          set -euo pipefail
          AUTH="Authorization: Bearer $RENDER_API_KEY"
          DEPLOY_ID="${{ steps.render-create.outputs.deploy_id }}"
          START_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          while :; do
            get() {
              local url=$1; shift
              local out; out=$(mktemp)
              local code
              code=$(curl -fsS -w "%{http_code}" -o "$out" "$@" "$url" || true)
              if [[ "$code" =~ ^5 ]]; then
                echo "Render API error $code:"; cat "$out"; sleep 8; return 1
              fi
              cat "$out"
            }

            STATUS=$(get "$RENDER_API_URL/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID" \
              -H "$AUTH" -H "Accept: application/json" | jq -r '.status' || continue)

            RESP=$(get "$RENDER_API_URL/v1/logs" -G -H "$AUTH" -H "Accept: application/json" \
              --data-urlencode "ownerId=$DEPLOY_ID" \
              --data-urlencode "resource=$RENDER_SERVICE_ID" \
              --data-urlencode "startTime=$START_TIME" \
              --data-urlencode "direction=forward" \
              --data-urlencode "limit=200") || continue

            echo "$RESP" | jq -r '.logs[]?.message'
            START_TIME=$(echo "$RESP" | jq -r '.nextStartTime // empty')

            case "$STATUS" in
              live|succeeded|completed) echo "Deploy complete."; break ;;
              failed|update_failed|canceled|cancelled|error|deactivated) echo "Deploy failed."; exit 1 ;;
              *) sleep 8 ;;
            esac
          done

      - name: Get Render service URL
        if: env.TARGET_ENV == 'staging'
        id: render-service
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ vars.RENDER_SERVICE_ID }}
          RENDER_API_URL: ${{ vars.RENDER_API_URL || 'https://api.render.com' }}
        run: |
          set -euo pipefail
          AUTH="Authorization: Bearer $RENDER_API_KEY"
          SERVICE_URL=$(curl -fsS -H "$AUTH" -H "Accept: application/json" \
            "$RENDER_API_URL/v1/services/$RENDER_SERVICE_ID" | jq -r '.serviceDetails.url')
          echo "service_url=$SERVICE_URL" >> "$GITHUB_OUTPUT"

      - name: Validate production deployment
        if: env.TARGET_ENV == 'production'
        id: production-validate
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          REGISTRY: ${{ env.REGISTRY }}
        run: |
          set -euo pipefail
          IMAGE_TAG="${IMAGE_TAG:-production-latest}"
          FULL_IMAGE="${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          echo "Deploying ${FULL_IMAGE} to production"
          echo "image=${FULL_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Azure Web App
        if: env.TARGET_ENV == 'production'
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ steps.production-validate.outputs.image }}

  notify-deployment-failure:
    needs: deploy-image
    if: ${{ always() && needs.deploy-image.result == 'failure' }}
    uses: ./.github/workflows/dispatch-teams-webhook.yml
    secrets: inherit
    with:
      summary: '❌ Deploy Failed'
      activity_title: '❌ Deploy Failed'
      theme_color: 'FF0000'
      stage: ${{ needs.deploy-image.outputs.environment == 'production' && 'Deploy (Production)' || 'Deploy (Staging)' }}
      environment: ${{ needs.deploy-image.outputs.environment }}

  # Step 5: Run integration tests
  integration-tests:
    needs: deploy-image
    if: needs.deploy-image.result == 'success' && needs.deploy-image.outputs.environment == 'staging'
    uses: ./.github/workflows/integration-tests.yml
    with:
      service-url: ${{ needs.deploy-image.outputs.service_url }}
      image-ref: ${{ needs.deploy-image.outputs['image-ref'] }}
      registry: ${{ needs.deploy-image.outputs.registry }}
    secrets: inherit

  notify-integration-tests-failure:
    needs: integration-tests
    if: ${{ always() && needs.integration-tests.result == 'failure' }}
    uses: ./.github/workflows/dispatch-teams-webhook.yml
    secrets: inherit
    with:
      summary: '❌ Pipeline Stage Failed'
      activity_title: '❌ Pipeline Stage Failed'
      theme_color: 'FF0000'
      stage: 'Integration Tests'

  notify-workflow-success:
    needs: [deploy-image, integration-tests]
    if: ${{ needs.deploy-image.result == 'success' && (needs.integration-tests.result == 'success' || needs.integration-tests.result == 'skipped') }}
    uses: ./.github/workflows/dispatch-teams-webhook.yml
    secrets: inherit
    with:
      summary: '✅ Workflow Complete'
      activity_title: '✅ Workflow Complete'
      theme_color: '00FF00'
      stage: 'Workflow Complete'
      environment: ${{ needs.deploy-image.outputs.environment }}
      include_commit: false
      additional_facts: |
        [
          {
            "name": "Deployment",
            "value": "${{ needs.deploy-image.outputs.service_url }}"
          }
        ]
