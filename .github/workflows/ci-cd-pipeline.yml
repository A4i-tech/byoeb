name: CI/CD Pipeline

on:
  push:
    # TODO(Issue #137): remove "nikunj/issue-137-deepwiki" after DeepWiki step is verified
    branches: [ "a4i/main", "a4i/staging", "nikunj/issue-137-deepwiki" ]
  pull_request:
    branches: [ "a4i/main", "a4i/staging" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Step 1a: Run byoeb-core checks (install only)
  unit-test-byoeb-core:
    name: byoeb-core (build-test)
    uses: ./.github/workflows/unit-tests.yml
    with:
      directory: ./byoeb-v1/byoeb-core
      tests-path: .
    secrets: inherit

  # Step 1b: Run byoeb unit tests
  unit-test-byoeb:
    name: byoeb (build-test)
    uses: ./.github/workflows/unit-tests.yml
    with:
      directory: ./byoeb-v1/byoeb
      tests-path: tests/unit
      coverage-artifact-name: coverage-html-byoeb
      upload-html-coverage: true
      coverage-gist-id: ${{ github.event_name == 'push' && github.ref_name == 'a4i/main' && vars.COVERAGE_GIST_ID || '' }}
    secrets: inherit

  # Step 1c: Run byoeb-integrations unit tests
  unit-test-byoeb-integrations:
    name: byoeb-integrations (build-test)
    uses: ./.github/workflows/unit-tests.yml
    with:
      directory: ./byoeb-v1/byoeb-integrations
      tests-path: .
      coverage-artifact-name: coverage-html-byoeb-integrations
      upload-html-coverage: true
      coverage-gist-id: ${{ github.event_name == 'push' && github.ref_name == 'a4i/main' && vars.COVERAGE_GIST_ID || '' }}
    secrets: inherit

  # Step 2: Build (validates Dockerfile - uses Docker layer caching for fast builds)
  build:
    name: Build Docker image
    outputs:
      image-name: ${{ steps.image-name.outputs.image_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image-name
        run: |
          echo "image_name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validation only, no push)
        uses: docker/build-push-action@v5
        with:
          context: ./byoeb-v1
          file: ./byoeb-v1/Dockerfile
          push: false
          tags: ${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name }}:build-validation
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Teams of build failure
        if: ${{ failure() && github.event_name != 'pull_request' }}
        uses: ./.github/actions/dispatch-teams-webhook
        with:
          summary: '❌ Pipeline Stage Failed'
          activity-title: '❌ Pipeline Stage Failed'
          theme-color: 'FF0000'
          facts: |
            [
              {
                "name": "Stage",
                "value": "Build"
              },
              {
                "name": "Actor",
                "value": "${{ github.actor }}"
              }
            ]
          teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}

  # Step 4: Publish Docker Image (only if tests passed)
  publish-image:
    name: Publish image
    needs: [build, unit-test-byoeb-core, unit-test-byoeb, unit-test-byoeb-integrations]
    if: success() && github.event_name == 'push' && (github.ref_name == 'a4i/staging' || github.ref_name == 'a4i/main')
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.image-info.outputs.tag }}
      image-ref: ${{ steps.image-info.outputs.ref }}
      image-digest: ${{ steps.build.outputs.digest }}
      registry: ${{ env.REGISTRY }}
      environment: ${{ steps.target.outputs.environment }}
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine publish target
        id: target
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          case "$REF_NAME" in
            a4i/staging)
              echo "environment=staging" >> "$GITHUB_OUTPUT"
              echo "tag_prefix=staging" >> "$GITHUB_OUTPUT"
              ;;
            a4i/main)
              echo "environment=production" >> "$GITHUB_OUTPUT"
              echo "tag_prefix=production" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported publish target for ref: $REF_NAME" >&2
              exit 1
              ;;
          esac

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.build.outputs['image-name'] }}
          tags: |
            type=raw,value=${{ steps.target.outputs.tag_prefix }}-{{sha}}
            type=raw,value=${{ steps.target.outputs.tag_prefix }}-latest

      - name: Capture image reference
        id: image-info
        env:
          META_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          first="$(printf '%s\n' "$META_TAGS" | head -n 1)"
          if [ -z "$first" ]; then
            echo "Unable to determine image tag from metadata output" >&2
            exit 1
          fi
          printf 'ref=%s\n' "$first" >> "$GITHUB_OUTPUT"
          printf 'tag=%s\n' "${first##*:}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./byoeb-v1
          file: ./byoeb-v1/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Teams of publish failure
        if: ${{ failure() && github.event_name != 'pull_request' && (github.ref_name == 'a4i/staging' || github.ref_name == 'a4i/main') }}
        uses: ./.github/actions/dispatch-teams-webhook
        with:
          summary: '❌ Pipeline Stage Failed'
          activity-title: '❌ Pipeline Stage Failed'
          theme-color: 'FF0000'
          facts: |
            [
              {
                "name": "Stage",
                "value": "${{ github.ref_name == 'a4i/main' && 'Publish Image (Production)' || 'Publish Image (Staging)' }}"
              },
              {
                "name": "Environment",
                "value": "${{ github.ref_name == 'a4i/main' && 'production' || 'staging' }}"
              }
            ]
          teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}

  # Step 5a: Deploy staging via Render reusable workflow
  deploy-staging:
    name: Deploy (staging)
    needs: publish-image
    if: success() && needs.publish-image.outputs.environment == 'staging'
    uses: ./.github/workflows/deploy-render.yml
    with:
      service-id: ${{ vars.RENDER_SERVICE_ID }}
      api-base-url: ${{ vars.RENDER_API_URL || 'https://api.render.com' }}
    secrets:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}

  # Step 5b: Deploy production via reusable workflow
  deploy-production:
    name: Deploy (production)
    needs: publish-image
    if: success() && needs.publish-image.outputs.environment == 'production'
    uses: ./.github/workflows/deploy-azure-webapp.yml
    with:
      azure-webapp-name: ${{ vars.AZURE_WEBAPP_NAME }}
      image-tag: ${{ needs.publish-image.outputs['image-tag'] }}
    secrets:
      AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}

  # Step 5a: Run integration tests (staging — on merge to a4i/staging)
  # Integration test job never fails the pipeline (see integration-tests.yml)
  integration-tests-staging:
    name: Integration tests (staging)
    needs: [deploy-staging, publish-image]
    if: needs.deploy-staging.result == 'success'
    uses: ./.github/workflows/integration-tests.yml
    with:
      service-url: ${{ needs.deploy-staging.outputs['service-url'] }}
      image-ref: ${{ needs.publish-image.outputs['image-ref'] }}
      registry: ${{ needs.publish-image.outputs.registry }}
      environment: ${{ needs.publish-image.outputs.environment }}
      deployment-url: ${{ needs.deploy-staging.outputs['service-url'] }}
    secrets: inherit

  # Step 5b: Run integration tests (production — on merge to a4i/main)
  # Integration test job never fails the pipeline (see integration-tests.yml)
  integration-tests-production:
    name: Integration tests (production)
    needs: [deploy-production, publish-image]
    if: needs.deploy-production.result == 'success'
    uses: ./.github/workflows/integration-tests.yml
    with:
      service-url: ${{ needs.deploy-production.outputs['service-url'] }}
      image-ref: ${{ needs.publish-image.outputs['image-ref'] }}
      registry: ${{ needs.publish-image.outputs.registry }}
      environment: production
      deployment-url: ${{ needs.deploy-production.outputs['service-url'] }}
    secrets: inherit

  # Step 6: Trigger DeepWiki re-index on production push (Issue #137)
  # Runs after build (not publish-image) so it also executes on feature branches for testing.
  # On a4i/main this fires after the Docker build succeeds; the badge handles weekly auto-refresh.
  # TODO(Issue #137): remove "nikunj/issue-137-deepwiki" from branch condition after verification
  deepwiki-index:
    name: Trigger DeepWiki index
    needs: [build]
    if: >
      github.event_name == 'push' &&
      (github.ref_name == 'a4i/main' || github.ref_name == 'nikunj/issue-137-deepwiki')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Xvfb, Playwright + stealth plugin
        run: |
          sudo apt-get install -y xvfb
          npm install playwright playwright-extra puppeteer-extra-plugin-stealth
          npx playwright install chromium --with-deps
      - name: Trigger DeepWiki refresh via browser
        env:
          DEEPWIKI_EMAIL: ${{ secrets.DEEPWIKI_EMAIL }}
          DISPLAY: :99
        run: |
          # Start virtual display — browser runs non-headless on it,
          # making it indistinguishable from a real desktop Chrome session
          Xvfb :99 -screen 0 1280x800x24 &
          sleep 2

          cat > deepwiki_refresh.js << 'JSEOF'
          const { chromium } = require('playwright-extra');
          const StealthPlugin = require('puppeteer-extra-plugin-stealth');
          chromium.use(StealthPlugin());

          (async () => {
            const email = process.env.DEEPWIKI_EMAIL;
            if (!email) {
              console.log('DEEPWIKI_EMAIL secret not set. See docs/DEEPWIKI_CD.md. Use dev.a4i@iiitb.ac.in for DeepWiki integration.');
              process.exit(0);
            }
            console.log('Launching real (non-headless) browser on virtual display...');

            const browser = await chromium.launch({
              // Non-headless: runs as a real browser on Xvfb virtual display.
              // No headless fingerprint signals — CAPTCHA should not trigger.
              headless: false,
              args: [
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--disable-dev-shm-usage',
                '--disable-blink-features=AutomationControlled',
                '--window-size=1280,800',
              ],
            });

            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
              viewport: { width: 1280, height: 800 },
              locale: 'en-US',
              timezoneId: 'America/New_York',
              extraHTTPHeaders: { 'Accept-Language': 'en-US,en;q=0.9' },
            });

            const page = await context.newPage();

            // Capture POST requests — once we confirm the API endpoint, browser
            // automation can be replaced with a direct curl call entirely.
            const capturedRequests = [];
            page.on('request', req => {
              if (req.method() === 'POST') {
                capturedRequests.push({ url: req.url(), postData: req.postData(), headers: req.headers() });
              }
            });

            console.log('Navigating to DeepWiki...');
            await page.goto('https://deepwiki.com/A4i-tech/byoeb', {
              waitUntil: 'load',
              timeout: 60000,
            });

            await page.waitForSelector('button:has-text("Enter email to refresh")', { timeout: 30000 });
            await page.screenshot({ path: 'deepwiki-before.png' });
            console.log('Page ready.');

            await page.waitForTimeout(1500);
            await page.mouse.move(640, 400);
            await page.waitForTimeout(300);
            await page.mouse.move(500, 350);
            await page.waitForTimeout(200);

            await page.click('button:has-text("Enter email to refresh")');
            await page.waitForTimeout(1000);

            await page.waitForSelector('input[placeholder="your@email.com"]', { timeout: 10000 });
            await page.screenshot({ path: 'deepwiki-after-toggle.png' });

            await page.click('input[placeholder="your@email.com"]');
            await page.waitForTimeout(300);
            await page.type('input[placeholder="your@email.com"]', email, { delay: 80 });
            await page.waitForTimeout(600);

            await page.click('button:has-text("Start refresh")');
            console.log('DeepWiki refresh triggered for A4i-tech/byoeb using ' + email);

            await page.waitForTimeout(5000);
            await page.screenshot({ path: 'deepwiki-after-submit.png' });

            if (capturedRequests.length > 0) {
              console.log('=== Captured POST requests (for future direct API use) ===');
              capturedRequests.forEach(r => console.log(JSON.stringify({ url: r.url, postData: r.postData })));
            }

            await browser.close();
          })().catch(err => { console.error('DeepWiki refresh failed (non-blocking):', err.message); process.exit(0); });
          JSEOF
          node deepwiki_refresh.js
      - name: Upload DeepWiki debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deepwiki-screenshots
          path: deepwiki-*.png
          retention-days: 3
