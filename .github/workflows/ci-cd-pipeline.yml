name: CI/CD Pipeline

on:
  push:
    branches: [ "a4i/main", "a4i/main-CD-1" ]
  pull_request:
    branches: [ "a4i/main", "a4i/main-CD-1" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}

jobs:
  # Step 1: Build (validates Dockerfile - uses Docker layer caching for fast builds)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image-name
        run: |
          echo "image_name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validation only, no push)
        uses: docker/build-push-action@v5
        with:
          context: ./byoeb-v1/byoeb/
          file: ./byoeb-v1/byoeb/Dockerfile
          push: false
          tags: ${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name }}:build-validation
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify build failure
        if: failure() && github.event_name != 'pull_request'
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then exit 0; fi
          curl -X POST -H "Content-Type: application/json" \
            -d '{"@type":"MessageCard","@context":"http://schema.org/extensions","themeColor":"FF0000","summary":"❌ Pipeline Stage Failed","sections":[{"activityTitle":"❌ Pipeline Stage Failed","facts":[{"name":"Stage","value":"Build"},{"name":"Branch","value":"${{ github.ref_name }}"},{"name":"Commit","value":"${{ github.sha }}"},{"name":"Triggered by","value":"${{ github.actor }}"},{"name":"Workflow","value":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}]}]}' \
            "$TEAMS_WEBHOOK_URL" || true
        continue-on-error: true

  # Step 2: Run unit tests and integration tests
  tests:
    needs: build
    uses: ./.github/workflows/tests.yml
    secrets: inherit

  notify-tests-failure:
    needs: tests
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Notify unit test failure
        if: always() && needs.tests.outputs.unit-tests-passed == 'false'
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then exit 0; fi
          curl -X POST -H "Content-Type: application/json" \
            -d '{"@type":"MessageCard","@context":"http://schema.org/extensions","themeColor":"FF0000","summary":"❌ Pipeline Stage Failed","sections":[{"activityTitle":"❌ Pipeline Stage Failed","facts":[{"name":"Stage","value":"Unit Tests"},{"name":"Branch","value":"${{ github.ref_name }}"},{"name":"Commit","value":"${{ github.sha }}"},{"name":"Workflow","value":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}]}]}' \
            "$TEAMS_WEBHOOK_URL" || true
        continue-on-error: true

      - name: Notify integration test failure
        if: always() && needs.integration-tests.outputs.integration-tests-passed == 'false'
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then exit 0; fi
          curl -X POST -H "Content-Type: application/json" \
            -d '{"@type":"MessageCard","@context":"http://schema.org/extensions","themeColor":"FF0000","summary":"❌ Pipeline Stage Failed","sections":[{"activityTitle":"❌ Pipeline Stage Failed","facts":[{"name":"Stage","value":"Integration Tests"},{"name":"Branch","value":"${{ github.ref_name }}"},{"name":"Commit","value":"${{ github.sha }}"},{"name":"Workflow","value":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}]}]}' \
            "$TEAMS_WEBHOOK_URL" || true
        continue-on-error: true

  # Step 4: Publish Staging Docker Image (only if tests passed)
  # Uses Docker layer caching from build step for fast builds
  publish-staging-image:
    needs: tests
    if: success() && needs.tests.outputs.unit-tests-passed == 'true' && needs.tests.outputs.integration-tests-passed == 'true' && github.event_name == 'push' && github.ref_name == 'a4i/main-CD-1'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-ref: ${{ steps.staging-tag.outputs.tag }}
      image-digest: ${{ steps.build.outputs.digest }}
      registry: ${{ env.REGISTRY }}
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image-name
        run: |
          echo "image_name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name }}
          tags: |
            type=raw,value=staging-{{sha}}
            type=raw,value=staging-latest

      - name: Select staging image tag
        id: staging-tag
        env:
          META_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          first="$(printf '%s\n' "$META_TAGS" | head -n 1)"
          if [ -z "$first" ]; then
            echo "Unable to determine staging tag from metadata output" >&2
            exit 1
          fi
          printf 'tag=%s\n' "$first" >> "$GITHUB_OUTPUT"

      - name: Build and push staging Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./byoeb-v1/byoeb/
          file: ./byoeb-v1/byoeb/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify publish staging failure
        if: failure() && github.event_name != 'pull_request'
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then exit 0; fi
          curl -X POST -H "Content-Type: application/json" \
            -d '{"@type":"MessageCard","@context":"http://schema.org/extensions","themeColor":"FF0000","summary":"❌ Pipeline Stage Failed","sections":[{"activityTitle":"❌ Pipeline Stage Failed","facts":[{"name":"Stage","value":"Publish Staging Image"},{"name":"Branch","value":"${{ github.ref_name }}"},{"name":"Commit","value":"${{ github.sha }}"},{"name":"Workflow","value":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}]}]}' \
            "$TEAMS_WEBHOOK_URL" || true
        continue-on-error: true

  # Step 5: Deploy to Render Staging
  deploy-staging:
    needs: publish-staging-image
    if: success() && needs.publish-staging-image.result == 'success'
    uses: ./.github/workflows/render-deploy.yaml
    with:
      service_id: ${{ vars.RENDER_SERVICE_ID }}
    secrets:
      render_api_key: ${{ secrets.RENDER_API_KEY }}

  notify-deploy-success:
    needs: [publish-staging-image, deploy-staging, publish-production-image, deploy-production]
    if: always() && (
         (needs.publish-staging-image.result == 'success' && needs.deploy-staging.result == 'success') ||
         (needs.publish-production-image.result == 'success' && needs.deploy-production.result == 'success')
       )
    runs-on: ubuntu-latest
    steps:
      - name: Send success notification
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then exit 0; fi

          ENVIRONMENT="unknown"
          if [ "${{ needs.deploy-staging.result }}" == "success" ]; then ENVIRONMENT="a4i/main-CD-1"; fi
          if [ "${{ needs.deploy-production.result }}" == "success" ]; then ENVIRONMENT="production"; fi

          curl -X POST -H "Content-Type: application/json" \
            -d "{\"@type\":\"MessageCard\",\"@context\":\"http://schema.org/extensions\",\"themeColor\":\"00FF00\",\"summary\":\"✅ Deploy Success\",\"sections\":[{\"activityTitle\":\"✅ Deploy Success\",\"facts\":[{\"name\":\"Branch\",\"value\":\"${{ github.ref_name }}\"},{\"name\":\"Environment\",\"value\":\"$ENVIRONMENT\"},{\"name\":\"Workflow\",\"value\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}]}]}" \
            "$TEAMS_WEBHOOK_URL" || true
        continue-on-error: true

  notify-deploy-failure:
    needs: [publish-staging-image, deploy-staging, publish-production-image, deploy-production]
    if: always() && (
         (needs.publish-staging-image.result == 'success' && needs.deploy-staging.result == 'failure') ||
         (needs.publish-production-image.result == 'success' && needs.deploy-production.result == 'failure')
       )
    runs-on: ubuntu-latest
    steps:
      - name: Send failure notification
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then exit 0; fi

          ENVIRONMENT="unknown"
          if [ "${{ needs.deploy-staging.result }}" == "failure" ]; then ENVIRONMENT="a4i/main-CD-1"; fi
          if [ "${{ needs.deploy-production.result }}" == "failure" ]; then ENVIRONMENT="production"; fi

          curl -X POST -H "Content-Type: application/json" \
            -d "{\"@type\":\"MessageCard\",\"@context\":\"http://schema.org/extensions\",\"themeColor\":\"FF0000\",\"summary\":\"❌ Deploy Failed\",\"sections\":[{\"activityTitle\":\"❌ Deploy Failed\",\"facts\":[{\"name\":\"Environment\",\"value\":\"$ENVIRONMENT\"},{\"name\":\"Branch\",\"value\":\"${{ github.ref_name }}\"},{\"name\":\"Commit\",\"value\":\"${{ github.sha }}\"},{\"name\":\"Workflow\",\"value\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}]}]}" \
            "$TEAMS_WEBHOOK_URL" || true
        continue-on-error: true

  # Step 6: Publish Production Docker Image (only if integration tests passed)
  publish-production-image:
    needs: tests
    if: success() && needs.tests.outputs.unit-tests-passed == 'true' && needs.tests.outputs.integration-tests-passed == 'true' && github.event_name == 'push' && github.ref_name == 'a4i/main'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.production-tag.outputs.tag }}
      image-digest: ${{ steps.build.outputs.digest }}
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image-name
        run: |
          echo "image_name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata for production
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name }}
          tags: |
            type=raw,value=production-{{sha}}
            type=raw,value=production-latest

      - name: Select production image tag
        id: production-tag
        env:
          META_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          first="$(printf '%s\n' "$META_TAGS" | head -n 1)"
          tag="${first##*:}"
          if [ -z "$tag" ]; then
            echo "Unable to parse production tag from metadata output" >&2
            exit 1
          fi
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"

      - name: Build and push production Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./byoeb-v1/byoeb/
          file: ./byoeb-v1/byoeb/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify publish production failure
        if: failure() && github.event_name != 'pull_request'
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then exit 0; fi
          curl -X POST -H "Content-Type: application/json" \
            -d '{"@type":"MessageCard","@context":"http://schema.org/extensions","themeColor":"FF0000","summary":"❌ Pipeline Stage Failed","sections":[{"activityTitle":"❌ Pipeline Stage Failed","facts":[{"name":"Stage","value":"Publish Production Image"},{"name":"Branch","value":"${{ github.ref_name }}"},{"name":"Commit","value":"${{ github.sha }}"},{"name":"Workflow","value":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}]}]}' \
            "$TEAMS_WEBHOOK_URL" || true
        continue-on-error: true

  deploy-production:
    needs: publish-production-image
    uses: ./.github/workflows/deploy-production.yml
    with:
      azure_webapp_name: ${{ vars.AZURE_WEBAPP_NAME }}
      image_tag: ${{ needs.publish-production-image.outputs['image-tag'] }}
    secrets: inherit
