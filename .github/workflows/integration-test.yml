name: Integration Tests

on:
  workflow_call:
    outputs:
      tests-passed:
        description: "Whether integration tests passed"
        value: ${{ jobs.integration-tests.outputs.tests-passed }}

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tests-passed: ${{ steps.test-results.outputs.tests-passed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set integration test image name
        id: test-image
        run: echo "image=integration-tests:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image for integration tests
        uses: docker/build-push-action@v5
        with:
          context: ./byoeb-v1/byoeb/
          file: ./byoeb-v1/byoeb/Dockerfile
          push: false
          tags: ${{ steps.test-image.outputs.image }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write staging environment file
        id: write-env
        env:
          STAGING_ENVS: ${{ secrets.STAGING_ENVS }}
        run: |
          set -eo pipefail
          if [ -z "$STAGING_ENVS" ]; then
            echo "STAGING_ENVS secret is empty" >&2
            exit 1
          fi
          printf '%s\n' "$STAGING_ENVS" > keys.env
          chmod 600 keys.env

      - name: Start application container
        id: start-container
        env:
          IMAGE: ${{ steps.test-image.outputs.image }}
          KEYS_FILE: ${{ github.workspace }}/keys.env
        run: |
          set -eo pipefail
          docker run -d --rm \
            --name integration-app \
            -p 8000:8000 \
            -v "$KEYS_FILE:/app/keys.env:ro" \
            "$IMAGE"

      - name: Wait for application readiness
        env:
          HEALTHCHECK_URL: http://127.0.0.1:8000/
        run: |
          set -eo pipefail
          docker logs -f integration-app &
          LOGS_PID=$!
          cleanup() {
            kill "$LOGS_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for attempt in {1..30}; do
            if curl -s -o /dev/null "$HEALTHCHECK_URL"; then
              exit 0
            fi
            echo "Waiting for application... ($attempt/30)"
            sleep 5
          done
          echo "Application failed to become ready in time"
          docker logs integration-app || true
          exit 1

      - name: Run integration tests
        id: run-tests
        continue-on-error: true
        env:
          RECIEVE_URL: http://127.0.0.1:8000/receive
          USER_NAME: ${{ secrets.USERNAME }}
          PHONE_NUMBER_ID: ${{ secrets.PHONE_NUMBER }}
          IMAGE: ${{ steps.test-image.outputs.image }}
        run: |
          set -o pipefail
          docker logs -f integration-app &
          LOGS_PID=$!
          cleanup() {
            kill "$LOGS_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          TEST_EXIT_CODE=0
          docker run --rm \
            --network host \
            -e RECIEVE_URL="$RECIEVE_URL" \
            -e USER_NAME="$USER_NAME" \
            -e PHONE_NUMBER_ID="$PHONE_NUMBER_ID" \
            "$IMAGE" \
            poetry run pytest tests/integration || TEST_EXIT_CODE=$?
          exit "$TEST_EXIT_CODE"

      - name: Record test result
        id: test-results
        if: ${{ always() }}
        env:
          TEST_OUTCOME: ${{ steps.run-tests.outcome }}
        run: |
          if [ "$TEST_OUTCOME" = "success" ]; then
            echo "tests-passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "tests-passed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop application container
        if: ${{ always() }}
        run: |
          docker stop integration-app || true
          rm -f keys.env

      - name: Fail if tests failed
        if: ${{ steps.run-tests.outcome != 'success' }}
        run: |
          echo "Integration tests failed"
          exit 1
