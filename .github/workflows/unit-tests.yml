name: Unit Tests

on:
  workflow_call:
    inputs:
      directory:
        description: "Relative path to the Poetry project"
        required: true
        type: string
      tests-path:
        description: "Path passed to pytest. Leave empty to skip running tests."
        required: false
        default: ""
        type: string
      coverage-artifact-name:
        description: "Name for the uploaded HTML coverage artifact"
        required: false
        default: "coverage-html"
        type: string
      upload-html-coverage:
        description: "Upload htmlcov directory as an artifact"
        required: false
        default: false
        type: boolean
      coverage-gist-id:
        description: "ID of the GitHub gist to update with the coverage badge JSON"
        required: false
        default: ""
        type: string
    outputs:
      coverage-pct:
        description: "Rounded coverage percentage (when tests are executed)"
        value: ${{ jobs.build-test.outputs.coverage-pct }}

jobs:
  build-test:
    runs-on: ubuntu-latest

    env:
      POETRY_VIRTUALENVS_IN_PROJECT: "true"

    outputs:
      coverage-pct: ${{ steps.coverage.outputs.coverage-pct }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ffmpeg (needed by pydub)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Poetry
        run: pipx install poetry

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "poetry"
          cache-dependency-path: |
            ${{ inputs.directory }}/pyproject.toml

      - name: Install dependencies
        working-directory: ${{ inputs.directory }}
        run: poetry install --no-interaction

      - name: Run tests
        if: ${{ inputs.tests-path != '' }}
        working-directory: ${{ inputs.directory }}
        run: poetry run pytest ${{ inputs.tests-path }}

      - name: Generate coverage JSON
        if: ${{ inputs.tests-path != '' }}
        working-directory: ${{ inputs.directory }}
        run: poetry run coverage json -o coverage.json

      - name: Extract coverage percentage
        if: ${{ inputs.tests-path != '' }}
        id: coverage
        working-directory: ${{ inputs.directory }}
        run: |
          COVERAGE=$(jq -r '.totals.percent_covered' coverage.json | awk '{print int($1+0.999)}')
          echo "coverage-pct=$COVERAGE" >> $GITHUB_OUTPUT 
          echo "Coverage: $COVERAGE%"

      - name: Upload HTML coverage
        if: ${{ always() && inputs.upload-html-coverage && inputs.tests-path != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.coverage-artifact-name }}
          path: ${{ inputs.directory }}/htmlcov
          if-no-files-found: ignore

      - name: Prepare coverage badge metadata
        if: ${{ inputs.coverage-gist-id != '' && inputs.tests-path != '' }}
        id: coverage_badge_meta
        run: |
          set -euo pipefail
          DIR="${{ inputs.directory }}"
          CLEAN="${DIR#./}"
          LEAF="${CLEAN##*/}"
          echo "filename=${LEAF}.json" >> "$GITHUB_OUTPUT"
          echo "label=coverage (${LEAF})" >> "$GITHUB_OUTPUT"

      - name: Upload coverage badge
        if: ${{ inputs.coverage-gist-id != '' && inputs.tests-path != '' }}
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.COVERAGE_GIST_TOKEN }}
          gistID: ${{ inputs.coverage-gist-id }}
          filename: ${{ steps.coverage_badge_meta.outputs.filename }}
          label: ${{ steps.coverage_badge_meta.outputs.label }}
          message: ${{ steps.coverage.outputs.coverage-pct }}%
          color: ${{ steps.coverage.outputs.coverage-pct > 80 && 'brightgreen' || steps.coverage.outputs.coverage-pct > 60 && 'yellow' || 'red' }}

      - name: Notify Teams of unit test failure
        if: ${{ failure() }}
        uses: ./.github/actions/dispatch-teams-webhook
        with:
          summary: '❌ Pipeline Stage Failed'
          activity-title: '❌ Pipeline Stage Failed'
          theme-color: 'FF0000'
          facts: |
            [
              {
                "name": "Stage",
                "value": "Unit Tests (${{ inputs.directory }})"
              }
            ]
          teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
