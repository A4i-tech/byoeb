name: Unit Tests

on:
  workflow_call:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    env:
      POETRY_VIRTUALENVS_IN_PROJECT: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ffmpeg (needed by pydub)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Poetry
        run: pipx install poetry

      # Cache Poetry/pip dependencies
      - name: Cache Poetry/pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: poetry-pip-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}
          restore-keys: |
            poetry-pip-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}
            poetry-pip-${{ runner.os }}-
            poetry-pip-

      # Cache virtual environments for each project
      - name: Cache .venv (byoeb-core)
        id: cache-byoeb-core
        uses: actions/cache@v4
        with:
          path: ./byoeb-v1/byoeb-core/.venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-byoeb-core-${{ hashFiles('byoeb-v1/byoeb-core/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-byoeb-core-

      - name: Cache .venv (byoeb)
        id: cache-byoeb
        uses: actions/cache@v4
        with:
          path: ./byoeb-v1/byoeb/.venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-byoeb-${{ hashFiles('byoeb-v1/byoeb/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-byoeb-

      - name: Cache .venv (byoeb-integrations)
        id: cache-byoeb-integrations
        uses: actions/cache@v4
        with:
          path: ./byoeb-v1/byoeb-integrations/.venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-byoeb-integrations-${{ hashFiles('byoeb-v1/byoeb-integrations/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-byoeb-integrations-

      # Install dependencies for byoeb-core
      - name: Install dependencies (byoeb-core)
        working-directory: ./byoeb-v1/byoeb-core
        run: poetry install --no-interaction

      # Install dependencies for byoeb
      - name: Install dependencies (byoeb)
        working-directory: ./byoeb-v1/byoeb
        run: poetry install --no-interaction

      # Install dependencies for byoeb-integrations
      - name: Install dependencies (byoeb-integrations)
        working-directory: ./byoeb-v1/byoeb-integrations
        run: poetry install --no-interaction

      # Run tests for byoeb-integrations (MongoDB tests)
      - name: Run tests (byoeb-integrations)
        working-directory: ./byoeb-v1/byoeb-integrations
        run: poetry run pytest
        id: byoeb-integrations-tests

      # Run tests for byoeb
      - name: Run tests (byoeb)
        working-directory: ./byoeb-v1/byoeb
        run: poetry run pytest tests/unit
        id: byoeb-tests

      # Upload HTML coverage artifacts
      - name: Upload HTML coverage (byoeb-integrations)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-byoeb-integrations
          path: ./byoeb-v1/byoeb-integrations/htmlcov
          if-no-files-found: ignore

      - name: Upload HTML coverage (byoeb)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-byoeb
          path: ./byoeb-v1/byoeb/htmlcov
          if-no-files-found: ignore
