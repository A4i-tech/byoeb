name: Unit Tests

on:
  workflow_call:
    inputs:
      directory:
        description: "Relative path to the Poetry project"
        required: true
        type: string
      tests_path:
        description: "Path passed to pytest. Leave empty to skip running tests."
        required: false
        default: ""
        type: string
      coverage_artifact_name:
        description: "Name for the uploaded HTML coverage artifact"
        required: false
        default: "coverage-html"
        type: string
      upload_html_coverage:
        description: "Upload htmlcov directory as an artifact"
        required: false
        default: false
        type: boolean
    outputs:
      coverage_pct:
        description: "Rounded coverage percentage (when tests are executed)"
        value: ${{ jobs.unit-tests.outputs.coverage_pct }}

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    env:
      POETRY_VIRTUALENVS_IN_PROJECT: "true"

    outputs:
      coverage_pct: ${{ steps.coverage.outputs.coverage_pct }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ffmpeg (needed by pydub)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Poetry
        run: pipx install poetry

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "poetry"
          cache-dependency-path: |
            ${{ inputs.directory }}/pyproject.toml

      - name: Cache poetry.lock
        uses: actions/cache@v4
        with:
          path: ${{ inputs.directory }}/poetry.lock
          key: lock-${{ runner.os }}-${{ hashFiles(format('{0}/pyproject.toml', inputs.directory)) }}
          restore-keys: |
            lock-${{ runner.os }}-

      - name: Install dependencies
        working-directory: ${{ inputs.directory }}
        run: poetry install --no-interaction

      - name: Run tests
        if: ${{ inputs.tests_path != '' }}
        working-directory: ${{ inputs.directory }}
        run: poetry run pytest ${{ inputs.tests_path }}

      - name: Generate coverage JSON
        if: ${{ inputs.tests_path != '' }}
        working-directory: ${{ inputs.directory }}
        run: poetry run coverage json -o coverage.json

      - name: Extract coverage percentage
        if: ${{ inputs.tests_path != '' }}
        id: coverage
        working-directory: ${{ inputs.directory }}
        run: |
          COVERAGE=$(jq -r '.totals.percent_covered' coverage.json | awk '{print int($1+0.999)}')
          echo "coverage_pct=$COVERAGE" >> $GITHUB_OUTPUT 
          echo "Coverage: $COVERAGE%"

      - name: Upload HTML coverage
        if: ${{ always() && inputs.upload_html_coverage && inputs.tests_path != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.coverage_artifact_name }}
          path: ${{ inputs.directory }}/htmlcov
          if-no-files-found: ignore

      - name: Notify Teams of unit test failure
        if: ${{ failure() }}
        uses: ./.github/actions/dispatch-teams-webhook
        with:
          summary: '❌ Pipeline Stage Failed'
          activity_title: '❌ Pipeline Stage Failed'
          theme_color: 'FF0000'
          facts: |
            [
              {
                "name": "Stage",
                "value": "Unit Tests (${{ inputs.directory }})"
              }
            ]
          teams_webhook_url: ${{ secrets.TEAMS_WEBHOOK_URL }}
