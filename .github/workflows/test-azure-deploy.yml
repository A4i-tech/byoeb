name: Test Azure Production Deploy

on:
  workflow_dispatch:
    inputs:
      test_input:
        description: 'Test input'
        required: false
        type: string
        default: 'test'

jobs:
  test-deployment:
    runs-on: ubuntu-latest
    steps:
      - name: Test Azure Deployment
        run: |
          echo "Testing Azure deployment workflow..."
          echo "This is a test run. No actual deployment occurs."
          sleep 3
          echo "Test completed successfully!"

  notify-test-success:
    needs: test-deployment
    runs-on: ubuntu-latest
    if: always() && needs.test-deployment.result == 'success'
    steps:
      - name: Send Test Success Notification to Teams
        run: |
          CARD_PAYLOAD=$(cat <<EOF
          {
            "@type": "MessageCard",
            "@context": "http://schema.org/extensions",
            "themeColor": "00FF00",
            "summary": "Byoeb Azure Deploy Test Successful",
            "sections": [{
              "activityTitle": "Byoeb Azure Deploy Test Successful",
              "activitySubtitle": "Test deployment workflow completed successfully",
              "facts": [
                {"name": "Environment", "value": "Test"},
                {"name": "Branch", "value": "${{ github.ref_name }}"},
                {"name": "Commit", "value": "${{ github.sha }}"},
                {"name": "Tested by", "value": "${{ github.actor }}"},
                {"name": "Test Time", "value": "$(date -u)"}
              ],
              "markdown": true
            }]
          }
          EOF
          )
          curl -X POST -H "Content-Type: application/json" \
            -d "$CARD_PAYLOAD" \
            "${{ secrets.TEAMS_WEBHOOK_URL }}"