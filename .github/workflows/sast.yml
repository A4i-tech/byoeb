name: SAST

on:
  workflow_call:
    secrets:
      SEMGREP_APP_TOKEN:
        description: "Optional Semgrep Cloud token — enables managed rules and dashboard upload"
        required: false
      TEAMS_WEBHOOK_URL:
        required: false

jobs:
  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 10   # prevents indefinite hang on semgrep cloud upload / SARIF API call
    permissions:
      contents: read
      security-events: write   # required to upload SARIF

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2

      - name: Install Semgrep
        run: pip --default-timeout=30 install semgrep==1.76.0

      - name: Run Semgrep
        # Single pass: --sarif + --output + --error together.
        # Semgrep writes the SARIF file before applying --error exit code,
        # so findings are captured even when the step exits non-zero.
        # Excluded rules are false positives for this codebase:
        #   insecure-hash-algorithms-md5 — MD5 used for non-crypto deterministic ID
        #     generation from phone numbers, not as a cryptographic signature
        #   python-logger-credential-disclosure — auth event log messages contain
        #     format strings describing events, not actual credential values
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: |
          semgrep scan \
            --config p/python \
            --config p/fastapi \
            --config p/secrets \
            --config p/owasp-top-ten \
            --sarif \
            --output semgrep.sarif \
            --error \
            --exclude-rule python.lang.security.insecure-hash-algorithms-md5.insecure-hash-algorithm-md5 \
            --exclude-rule python.lang.security.audit.logging.logger-credential-leak.python-logger-credential-disclosure \
            --exclude-rule python.lang.security.audit.insecure-file-permissions.insecure-file-permissions

      - name: Restrict SARIF file permissions
        if: always()
        # Limit read access to owner only before uploading.
        # Relevant on self-hosted runners with shared workspaces.
        run: chmod 600 semgrep.sarif

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f   # v3.28.18
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Notify Teams of Semgrep failure
        if: failure()
        uses: ./.github/actions/dispatch-teams-webhook
        with:
          summary: "❌ SAST (Semgrep) Failed"
          activity-title: "❌ SAST (Semgrep) Failed"
          theme-color: "FF0000"
          facts: |
            [
              {"name": "Stage", "value": "SAST — Semgrep"},
              {"name": "Actor", "value": "${{ github.actor }}"}
            ]
          teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}

  gitleaks:
    name: Gitleaks (secret scanning)
    runs-on: ubuntu-latest
    timeout-minutes: 10   # prevents indefinite hang on binary download or scan
    permissions:
      contents: read
      security-events: write   # required to upload SARIF

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2
        with:
          fetch-depth: 0   # full history required — gitleaks scans all commits for secrets

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          TARBALL="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL --max-time 30 --connect-timeout 10 \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${TARBALL}" \
            -o "${TARBALL}"
          curl -sSfL --max-time 30 --connect-timeout 10 \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" \
            -o checksums.txt
          grep "${TARBALL}" checksums.txt | sha256sum -c -
          tar -xzf "${TARBALL}" gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          rm -f "${TARBALL}" checksums.txt

      - name: Run Gitleaks
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --exit-code 1

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f   # v3.28.18
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Notify Teams of Gitleaks failure
        if: failure()
        uses: ./.github/actions/dispatch-teams-webhook
        with:
          summary: "❌ Secret Scanning (Gitleaks) Failed"
          activity-title: "❌ Secret Scanning (Gitleaks) Failed"
          theme-color: "FF0000"
          facts: |
            [
              {"name": "Stage", "value": "Secret Scanning — Gitleaks"},
              {"name": "Actor", "value": "${{ github.actor }}"}
            ]
          teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
