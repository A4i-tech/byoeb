name: SAST

on:
  workflow_call:
    secrets:
      SEMGREP_APP_TOKEN:
        description: "Optional Semgrep Cloud token — enables managed rules and dashboard upload"
        required: false
      TEAMS_WEBHOOK_URL:
        required: false

jobs:
  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # required to upload SARIF

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep (generate SARIF)
        # Run first pass to produce SARIF for GitHub Security tab.
        # Always succeeds so the upload step always has a file to upload.
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: |
          semgrep scan \
            --config p/python \
            --config p/fastapi \
            --config p/secrets \
            --config p/owasp-top-ten \
            --sarif \
            --output semgrep.sarif \
            --exclude-rule python.lang.security.insecure-hash-algorithms-md5.insecure-hash-algorithm-md5 \
            --exclude-rule python.lang.security.audit.logging.logger-credential-leak.python-logger-credential-disclosure \
            || true

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Run Semgrep (enforce — fail on findings)
        # Second pass with --error: exits 1 if any non-excluded findings remain.
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: |
          semgrep scan \
            --config p/python \
            --config p/fastapi \
            --config p/secrets \
            --config p/owasp-top-ten \
            --error \
            --exclude-rule python.lang.security.insecure-hash-algorithms-md5.insecure-hash-algorithm-md5 \
            --exclude-rule python.lang.security.audit.logging.logger-credential-leak.python-logger-credential-disclosure

      - name: Notify Teams of Semgrep failure
        if: failure()
        uses: ./.github/actions/dispatch-teams-webhook
        with:
          summary: "❌ SAST (Semgrep) Failed"
          activity-title: "❌ SAST (Semgrep) Failed"
          theme-color: "FF0000"
          facts: |
            [
              {"name": "Stage", "value": "SAST — Semgrep"},
              {"name": "Actor", "value": "${{ github.actor }}"}
            ]
          teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}

  gitleaks:
    name: Gitleaks (secret scanning)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history — gitleaks scans all commits

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Run Gitleaks
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --verbose \
            --redact \
            --exit-code 1

      - name: Notify Teams of Gitleaks failure
        if: failure()
        uses: ./.github/actions/dispatch-teams-webhook
        with:
          summary: "❌ Secret Scanning (Gitleaks) Failed"
          activity-title: "❌ Secret Scanning (Gitleaks) Failed"
          theme-color: "FF0000"
          facts: |
            [
              {"name": "Stage", "value": "Secret Scanning — Gitleaks"},
              {"name": "Actor", "value": "${{ github.actor }}"}
            ]
          teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
