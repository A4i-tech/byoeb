name: Deploy to Production

on:
  workflow_call:
    inputs:
      azure_webapp_name:
        description: 'Name of the Azure WebApp service'
        required: true
        type: string
      image_tag:
        description: 'Docker image tag to deploy (leave empty for latest production)'
        required: false
        type: string
    secrets:
      AZURE_WEBAPP_PUBLISH_PROFILE:
        required: true
      TEAMS_WEBHOOK_URL:
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}

permissions:
  contents: 'read'
  packages: 'write'

jobs:
  deploy:
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment
        run: |
          IMAGE_TAG="${{ inputs.image_tag || 'production-latest' }}"
          FULL_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          echo "🚀 Deploying to production: ${FULL_IMAGE}"
          echo "Deployment confirmed by: ${{ github.actor }}"
          echo "image=${FULL_IMAGE}" >> $GITHUB_OUTPUT
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
        id: validate

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ inputs.azure_webapp_name }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ steps.validate.outputs.image }}

      - name: Notify deployment success
        if: success()
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then exit 0; fi
          curl -X POST -H "Content-Type: application/json" \
            -d '{"@type":"MessageCard","@context":"http://schema.org/extensions","themeColor":"00FF00","summary":"✅ Deploy to Production - Success","sections":[{"activityTitle":"✅ Deploy to Production - Success","facts":[{"name":"Image","value":"${{ steps.validate.outputs.image }}"},{"name":"Deployed by","value":"${{ github.actor }}"},{"name":"Environment","value":"production"},{"name":"Workflow","value":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}]}]}' \
            "$TEAMS_WEBHOOK_URL" || true
        continue-on-error: true

      - name: Notify deployment failure
        if: failure()
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then exit 0; fi
          curl -X POST -H "Content-Type: application/json" \
            -d '{"@type":"MessageCard","@context":"http://schema.org/extensions","themeColor":"FF0000","summary":"❌ Pipeline Stage Failed","sections":[{"activityTitle":"❌ Pipeline Stage Failed","facts":[{"name":"Stage","value":"Deploy to Production"},{"name":"Branch","value":"${{ github.ref_name }}"},{"name":"Commit","value":"${{ github.sha }}"},{"name":"Deployed by","value":"${{ github.actor }}"},{"name":"Workflow","value":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}]}]}' \
            "$TEAMS_WEBHOOK_URL" || true
        continue-on-error: true
