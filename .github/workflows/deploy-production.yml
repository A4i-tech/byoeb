name: Deploy to Production

on:
  workflow_call:
    inputs:
      azure_webapp_name:
        description: 'Name of the Azure WebApp service'
        required: true
        type: string
      image_tag:
        description: 'Docker image tag to deploy (leave empty for latest production)'
        required: false
        type: string
    outputs:
      service_url:
        description: "Azure WebApp service URL"
        value: ${{ jobs.deploy.outputs.service_url }}
    secrets:
      AZURE_WEBAPP_PUBLISH_PROFILE:
        required: true
      TEAMS_WEBHOOK_URL:
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: 'read'
  packages: 'write'

jobs:
  deploy:
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.validate.outputs.image }}
      service_url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    steps:
      - name: Validate deployment
        run: |
          IMAGE_TAG="${{ inputs.image_tag || 'production-latest' }}"
          FULL_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          echo "🚀 Deploying to production: ${FULL_IMAGE}"
          echo "Deployment confirmed by: ${{ github.actor }}"
          echo "image=${FULL_IMAGE}" >> $GITHUB_OUTPUT
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
        id: validate

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ inputs.azure_webapp_name }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ steps.validate.outputs.image }}
