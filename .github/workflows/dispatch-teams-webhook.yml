name: Dispatch Teams Notification

on:
  workflow_call:
    inputs:
      summary:
        description: 'Short summary shown in the Teams notification'
        required: true
        type: string
      activity_title:
        description: 'Main title rendered inside the Teams card'
        required: true
        type: string
      theme_color:
        description: 'Hex color used to highlight the notification (e.g., FF0000)'
        required: false
        default: '0076D7'
        type: string
      stage:
        description: 'Optional stage or step name to include as a fact'
        required: false
        type: string
      environment:
        description: 'Optional environment name to include as a fact'
        required: false
        type: string
      include_branch:
        description: 'Include the current branch as a fact'
        required: false
        default: true
        type: boolean
      include_commit:
        description: 'Include the commit SHA as a fact'
        required: false
        default: true
        type: boolean
      include_workflow_link:
        description: 'Include a link to the workflow run as a fact'
        required: false
        default: true
        type: boolean
      include_actor:
        description: 'Include the triggering actor as a fact'
        required: false
        default: false
        type: boolean
      actor_label:
        description: 'Fact label to use when include_actor is true'
        required: false
        default: 'Actor'
        type: string
      additional_facts:
        description: 'JSON array of additional {"name": "...", "value": "..."} facts to append'
        required: false
        default: '[]'
        type: string
    secrets:
      TEAMS_WEBHOOK_URL:
        required: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch notification to Microsoft Teams
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          ADDITIONAL_FACTS_INPUT: ${{ inputs.additional_facts }}
        run: |
          set -euo pipefail

          if [ -z "${TEAMS_WEBHOOK_URL:-}" ]; then
            echo "TEAMS_WEBHOOK_URL secret not provided. Skipping Teams notification."
            exit 0
          fi

          FACTS='[]'

          add_fact() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              return
            fi
            FACTS="$(jq --arg name "$name" --arg value "$value" '. + [{"name":$name,"value":$value}]' <<< "$FACTS")"
          }

          add_fact "Stage" "${{ inputs.stage }}"
          add_fact "Environment" "${{ inputs.environment }}"

          if [ "${{ inputs.include_branch }}" = 'true' ]; then
            add_fact "Branch" "${{ github.ref_name }}"
          fi

          if [ "${{ inputs.include_commit }}" = 'true' ]; then
            add_fact "Commit" "${{ github.sha }}"
          fi

          if [ "${{ inputs.include_workflow_link }}" = 'true' ]; then
            add_fact "Workflow" "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          if [ "${{ inputs.include_actor }}" = 'true' ]; then
            add_fact "${{ inputs.actor_label }}" "${{ github.actor }}"
          fi

          ADDITIONAL_FACTS="$ADDITIONAL_FACTS_INPUT"

          if [ -n "$(echo "$ADDITIONAL_FACTS" | tr -d '[:space:]')" ]; then
            FACTS="$(jq --argjson extra "$ADDITIONAL_FACTS" '. + $extra' <<< "$FACTS")"
          fi

          PAYLOAD="$(jq -cn \
            --arg summary "${{ inputs.summary }}" \
            --arg activity "${{ inputs.activity_title }}" \
            --arg color "${{ inputs.theme_color }}" \
            --argjson facts "$FACTS" \
            '{ "@type":"MessageCard", "@context":"http://schema.org/extensions", "themeColor":$color, "summary":$summary, "sections":[{"activityTitle":$activity,"facts":$facts}] }' \
          )"

          curl -sS -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$TEAMS_WEBHOOK_URL" || true
