name: Tests

on:
  workflow_call:
    outputs:
      unit-tests-passed:
        description: "Whether all unit tests passed successfully"
        value: ${{ jobs.unit-tests.outputs.tests-passed }}
      integration-tests-passed:
        description: "Whether integration tests passed"
        value: ${{ jobs.integration-tests.outputs.tests-passed }}

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    outputs:
      tests-passed: ${{ steps.test-results.outputs.tests-passed }}

    env:
      POETRY_VIRTUALENVS_IN_PROJECT: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ffmpeg (needed by pydub)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Poetry
        run: pipx install poetry

      # Cache Poetry/pip dependencies
      - name: Cache Poetry/pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: poetry-pip-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}
          restore-keys: |
            poetry-pip-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}
            poetry-pip-${{ runner.os }}-
            poetry-pip-

      # Cache virtual environments for each project
      - name: Cache .venv (byoeb-core)
        id: cache-byoeb-core
        uses: actions/cache@v4
        with:
          path: ./byoeb-v1/byoeb-core/.venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-byoeb-core-${{ hashFiles('byoeb-v1/byoeb-core/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-byoeb-core-

      - name: Cache .venv (byoeb)
        id: cache-byoeb
        uses: actions/cache@v4
        with:
          path: ./byoeb-v1/byoeb/.venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-byoeb-${{ hashFiles('byoeb-v1/byoeb/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-byoeb-

      - name: Cache .venv (byoeb-integrations)
        id: cache-byoeb-integrations
        uses: actions/cache@v4
        with:
          path: ./byoeb-v1/byoeb-integrations/.venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-byoeb-integrations-${{ hashFiles('byoeb-v1/byoeb-integrations/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-byoeb-integrations-

      # Install dependencies for byoeb-core
      - name: Install dependencies (byoeb-core)
        working-directory: ./byoeb-v1/byoeb-core
        run: poetry install --no-interaction

      # Install dependencies for byoeb
      - name: Install dependencies (byoeb)
        working-directory: ./byoeb-v1/byoeb
        run: poetry install --no-interaction

      # Install dependencies for byoeb-integrations
      - name: Install dependencies (byoeb-integrations)
        working-directory: ./byoeb-v1/byoeb-integrations
        run: poetry install --no-interaction

      # Run tests for byoeb-integrations (MongoDB tests)
      - name: Run tests (byoeb-integrations)
        working-directory: ./byoeb-v1/byoeb-integrations
        run: poetry run pytest
        id: byoeb-integrations-tests

      # Run tests for byoeb
      - name: Run tests (byoeb)
        working-directory: ./byoeb-v1/byoeb
        run: poetry run pytest tests/unit
        id: byoeb-tests

      # Set test results based on both test runs
      - name: Set test results
        id: test-results
        run: |
          if [ "${{ steps.byoeb-integrations-tests.outcome }}" == "success" ] && [ "${{ steps.byoeb-tests.outcome }}" == "success" ]; then
            echo "tests-passed=true" >> $GITHUB_OUTPUT
          else
            echo "tests-passed=false" >> $GITHUB_OUTPUT
          fi

      # Upload HTML coverage artifacts
      - name: Upload HTML coverage (byoeb-integrations)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-byoeb-integrations
          path: ./byoeb-v1/byoeb-integrations/htmlcov
          if-no-files-found: ignore

      - name: Upload HTML coverage (byoeb)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-byoeb
          path: ./byoeb-v1/byoeb/htmlcov
          if-no-files-found: ignore

  integration-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tests-passed: ${{ steps.test-results.outputs.tests-passed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set integration test image name
        id: test-image
        run: echo "image=integration-tests:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image for integration tests
        uses: docker/build-push-action@v5
        with:
          context: ./byoeb-v1/byoeb/
          file: ./byoeb-v1/byoeb/Dockerfile
          push: false
          tags: ${{ steps.test-image.outputs.image }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write staging environment file
        id: write-env
        env:
          STAGING_ENVS: ${{ secrets.STAGING_ENVS }}
        run: |
          set -eo pipefail
          if [ -z "$STAGING_ENVS" ]; then
            echo "STAGING_ENVS secret is empty" >&2
            exit 1
          fi
          printf '%s\n' "$STAGING_ENVS" > keys.env
          chmod 600 keys.env

      - name: Start application container
        id: start-container
        env:
          IMAGE: ${{ steps.test-image.outputs.image }}
          KEYS_FILE: ${{ github.workspace }}/keys.env
        run: |
          set -eo pipefail
          docker run -d --rm \
            --name integration-app \
            -p 8000:8000 \
            -v "$KEYS_FILE:/app/keys.env:ro" \
            "$IMAGE"

      - name: Wait for application readiness
        env:
          HEALTHCHECK_URL: http://127.0.0.1:8000/
        run: |
          set -eo pipefail
          docker logs -f integration-app &
          LOGS_PID=$!
          cleanup() {
            kill "$LOGS_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for attempt in {1..30}; do
            if curl -s -o /dev/null "$HEALTHCHECK_URL"; then
              exit 0
            fi
            echo "Waiting for application... ($attempt/30)"
            sleep 5
          done
          echo "Application failed to become ready in time"
          docker logs integration-app || true
          exit 1

      - name: Run integration tests
        id: run-tests
        continue-on-error: true
        env:
          RECIEVE_URL: http://127.0.0.1:8000/receive
          USER_NAME: ${{ secrets.USERNAME }}
          PHONE_NUMBER_ID: ${{ secrets.PHONE_NUMBER }}
          IMAGE: ${{ steps.test-image.outputs.image }}
        run: |
          set -o pipefail
          docker logs -f integration-app &
          LOGS_PID=$!
          cleanup() {
            kill "$LOGS_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          TEST_EXIT_CODE=0
          docker run --rm \
            --network host \
            -e RECIEVE_URL="$RECIEVE_URL" \
            -e USER_NAME="$USER_NAME" \
            -e PHONE_NUMBER_ID="$PHONE_NUMBER_ID" \
            "$IMAGE" \
            poetry run pytest tests/integration || TEST_EXIT_CODE=$?
          exit "$TEST_EXIT_CODE"

      - name: Record test result
        id: test-results
        if: ${{ always() }}
        env:
          TEST_OUTCOME: ${{ steps.run-tests.outcome }}
        run: |
          if [ "$TEST_OUTCOME" = "success" ]; then
            echo "tests-passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "tests-passed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop application container
        if: ${{ always() }}
        run: |
          docker stop integration-app || true
          rm -f keys.env

      - name: Fail if tests failed
        if: ${{ steps.run-tests.outcome != 'success' }}
        run: |
          echo "Integration tests failed"
          exit 1
