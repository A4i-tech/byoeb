name: Deploy Production to Azure

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (leave empty for latest production)'
        required: false
        type: string
        default: 'production'
      confirm_deployment:
        description: 'Confirm deployment to Azure production'
        required: true
        type: choice
        options:
          - 'Yes, deploy to production'
          - 'No, cancel deployment'
        default: 'No, cancel deployment'

jobs:
  validate-deployment:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm_deployment == 'Yes, deploy to production' }}
    steps:
      - name: Validate deployment confirmation
        run: |
          if [ "${{ github.event.inputs.confirm_deployment }}" != "Yes, deploy to production" ]; then
            echo "Deployment cancelled by user"
            exit 1
          fi
          echo "Deployment confirmed by user"

      - name: Get production image tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            IMAGE_TAG="${{ github.event.inputs.image_tag }}"
            echo "Using specified image tag: $IMAGE_TAG"
          else
            IMAGE_TAG="production"
            echo "Using default production image tag: $IMAGE_TAG"
          fi
          echo "Full image: ghcr.io/${{ github.repository }}:$IMAGE_TAG"

  simulate-deployment:
    needs: validate-deployment
    runs-on: ubuntu-latest
    steps:
      - name: Simulate Azure Deployment
        run: |
          echo "Simulating deployment of ghcr.io/${{ github.repository }}:${{ github.event.inputs.image_tag || 'production' }} to Azure App Service..."
          echo "This is a test run. No actual Azure resources are being touched."
          sleep 5 # Simulate deployment time
          echo "Simulated deployment completed successfully!"

  notify-success:
    needs: [validate-deployment, simulate-deployment]
    runs-on: ubuntu-latest
    if: always() && needs.simulate-deployment.result == 'success'
    steps:
      - name: Send Success Notification to Teams
        run: |
          CARD_PAYLOAD=$(cat <<EOF
          {
            "@type": "MessageCard",
            "@context": "http://schema.org/extensions",
            "themeColor": "00FF00",
            "summary": "Byoeb Production Deployment Successful",
            "sections": [{
              "activityTitle": "Byoeb Production Deployment Successful",
              "activitySubtitle": "Production deployment to Azure completed successfully (simulated)",
              "facts": [
                {"name": "Environment", "value": "Production (Simulated)"},
                {"name": "Branch", "value": "${{ github.ref_name }}"},
                {"name": "Commit", "value": "${{ github.sha }}"},
                {"name": "Docker Image", "value": "ghcr.io/${{ github.repository }}:${{ github.event.inputs.image_tag || 'production' }}"},
                {"name": "Deployed by", "value": "${{ github.actor }}"},
                {"name": "Deployment Time", "value": "$(date -u)"}
              ],
              "markdown": true
            }]
          }
          EOF
          )
          curl -X POST -H "Content-Type: application/json" \
            -d "$CARD_PAYLOAD" \
            "${{ secrets.TEAMS_WEBHOOK_URL }}"