name: CD Render

on:
  workflow_call:
    inputs:
      service_id:
        description: "Render service identifier"
        required: true
        type: string
      deployment_payload:
        description: "JSON payload sent to Render deploy API"
        required: false
        type: string
      api_base_url:
        description: "Render API base URL"
        required: false
        type: string
    outputs:
      deploy_id:
        description: "Render deployment ID"
        value: ${{ jobs.deploy.outputs.deploy_id }}
      service_url:
        description: "Render service URL"
        value: ${{ jobs.deploy.outputs.service_url }}
    secrets:
      render_api_key:
        description: "Render API key"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      deploy_id: ${{ steps.create.outputs.deploy_id }}
      service_url: ${{ steps.service.outputs.service_url }}
    environment:
      name: 'staging'
      url: ${{ steps.service.outputs.service_url }}
    env:
      RENDER_API_KEY: ${{ secrets.render_api_key }}
      RENDER_SERVICE_ID: ${{ inputs.service_id }}
      RENDER_API_URL: ${{ inputs.api_base_url || 'https://api.render.com' }}
      DEPLOY_PAYLOAD: ${{ inputs.deployment_payload || '{}' }}
    steps:
      - name: Create deployment
        id: create
        run: |
          set -euo pipefail
          AUTH="Authorization: Bearer $RENDER_API_KEY"
          DEPLOY_JSON=$(curl -fsS -X POST -H "$AUTH" -H "Accept: application/json" \
            "$RENDER_API_URL/v1/services/$RENDER_SERVICE_ID/deploys" \
            -d "$DEPLOY_PAYLOAD")
          echo "$DEPLOY_JSON" | jq .
          DEPLOY_ID=$(echo "$DEPLOY_JSON" | jq -r '.id')
          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"

      - name: Watching deployment
        run: |
          set -euo pipefail
          AUTH="Authorization: Bearer $RENDER_API_KEY"
          DEPLOY_ID="${{ steps.create.outputs.deploy_id }}"
          START_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          while :; do
            get() {
              local url=$1; shift
              local out; out=$(mktemp)
              local code
              code=$(curl -fsS -w "%{http_code}" -o "$out" "$@" "$url" || true)
              if [[ "$code" =~ ^5 ]]; then
                echo "Render API error $code:"; cat "$out"; sleep 8; return 1
              fi
              cat "$out"
            }

            STATUS=$(get "$RENDER_API_URL/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID" \
              -H "$AUTH" -H "Accept: application/json" | jq -r '.status' || continue)

            RESP=$(get "$RENDER_API_URL/v1/logs" -G -H "$AUTH" -H "Accept: application/json" \
              --data-urlencode "ownerId=$DEPLOY_ID" \
              --data-urlencode "resource=$RENDER_SERVICE_ID" \
              --data-urlencode "startTime=$START_TIME" \
              --data-urlencode "direction=forward" \
              --data-urlencode "limit=200") || continue

            echo "$RESP" | jq -r '.logs[]?.message'
            START_TIME=$(echo "$RESP" | jq -r '.nextStartTime // empty')

            case "$STATUS" in
              live|succeeded|completed) echo "Deploy complete."; break ;;
              failed|update_failed|canceled|cancelled|error|deactivated) echo "Deploy failed."; exit 1 ;;
              *) sleep 8 ;;
            esac
          done

      - name: Get service URL
        id: service
        run: |
          set -euo pipefail
          AUTH="Authorization: Bearer $RENDER_API_KEY"
          SERVICE_URL=$(curl -fsS -H "$AUTH" -H "Accept: application/json" \
            "$RENDER_API_URL/v1/services/$RENDER_SERVICE_ID" | jq -r '.serviceDetails.url')
          echo "Service URL: $SERVICE_URL"
          echo "service_url=$SERVICE_URL" >> "$GITHUB_OUTPUT"
