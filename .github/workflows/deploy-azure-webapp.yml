name: Deploy to Azure WebApp

on:
  workflow_call:
    inputs:
      azure-webapp-name:
        description: 'Name of the Azure WebApp service'
        required: true
        type: string
      image-tag:
        description: 'Docker image tag to deploy (leave empty for latest production)'
        required: false
        type: string
    outputs:
      service-url:
        description: "Azure WebApp service URL"
        value: ${{ jobs.deploy.outputs['service-url'] }}
    secrets:
      AZURE_WEBAPP_PUBLISH_PROFILE:
        required: true
      TEAMS_WEBHOOK_URL:
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: 'read'
  packages: 'write'

jobs:
  deploy:
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.validate.outputs.image }}
      service-url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment
        run: |
          IMAGE_TAG="${{ inputs.image-tag || 'production-latest' }}"
          FULL_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          echo "🚀 Deploying to production: ${FULL_IMAGE}"
          echo "Deployment confirmed by: ${{ github.actor }}"
          echo "image=${FULL_IMAGE}" >> $GITHUB_OUTPUT
          echo "image-tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
        id: validate

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ inputs.azure-webapp-name }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ steps.validate.outputs.image }}

      - name: Notify Teams of production deploy failure
        if: ${{ failure() }}
        uses: ./.github/actions/dispatch-teams-webhook
        with:
          summary: '❌ Deploy Failed'
          activity-title: '❌ Deploy Failed'
          theme-color: 'FF0000'
          facts: |
            [
              {
                "name": "Stage",
                "value": "Deploy (Production)"
              },
              {
                "name": "Environment",
                "value": "production"
              }
            ]
          teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}

      - name: Notify Teams of workflow success (production)
        if: ${{ success() }}
        uses: ./.github/actions/dispatch-teams-webhook
        with:
          summary: '✅ Workflow Complete'
          activity-title: '✅ Workflow Complete'
          theme-color: '00FF00'
          facts: |
            [
              { "name": "Stage", "value": "Workflow Complete" },
              { "name": "Environment", "value": "production" },
              { "name": "Deployment", "value": "${{ steps.deploy-to-webapp.outputs.webapp-url || 'N/A' }}" }
            ]
          teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
