services:
  byoeb-chat:
    build:
      context: ./byoeb-v1
      dockerfile: Dockerfile
    command: poetry run python3 -m byoeb.chat_app.run --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    volumes:
      - local_media:/app/local_media_storage
      - vector_db:/app/vector_db
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  byoeb-kb:
    build:
      context: ./byoeb-v1
      dockerfile: Dockerfile
    command: poetry run python3 -m byoeb.kb_app.run --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    env_file:
      - .env.local
    volumes:
      - local_media:/app/local_media_storage
      - vector_db:/app/vector_db
    depends_on:
      mongodb:
        condition: service_healthy
    restart: on-failure

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mongo_data:
  redis_data:
  local_media:
  vector_db:
