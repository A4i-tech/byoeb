services:
  byoeb-chat:
    build:
      context: ./byoeb-v1
      dockerfile: Dockerfile
    command: poetry run python3 -m byoeb.chat_app.run --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    volumes:
      - local_media:/app/local_media_storage
      - vector_db:/app/vector_db
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure

  byoeb-kb:
    build:
      context: ./byoeb-v1
      dockerfile: Dockerfile
    command: poetry run python3 -m byoeb.kb_app.run --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    env_file:
      - .env.local
    volumes:
      - local_media:/app/local_media_storage
      - vector_db:/app/vector_db
    depends_on:
      mongodb:
        condition: service_healthy
    restart: on-failure

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "byoeb-local-cluster"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  mongo_data:
  kafka_data:
  local_media:
  vector_db:
