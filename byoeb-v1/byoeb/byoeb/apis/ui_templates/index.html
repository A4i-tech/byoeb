<!DOCTYPE html>
<html>
<head>
    <title>DateTime Picker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 20px;
        }
        .form-section {
            max-width: 600px;
        }
        .results {
            margin-top: 30px;
            width: 100%;
        }
        .table-wrapper {
            overflow-x: auto;
            white-space: nowrap;
        }
        table {
            width: 100%;
        }
    </style>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const now = new Date().toISOString().slice(0, 16);
            const startInput = document.querySelector('input[name="start_datetime"]');
            const endInput = document.querySelector('input[name="end_datetime"]');

            startInput.max = now;
            endInput.max = now;

            startInput.addEventListener('change', () => {
                const startVal = startInput.value;
                if (startVal) {
                    endInput.min = startVal;
                    endInput.max = now;

                    if (endInput.value < startVal || endInput.value > now) {
                        endInput.value = startVal;
                    }
                } else {
                    endInput.min = "";
                    endInput.max = now;
                }
            });
        });
    </script>
</head>
<body>
    <div class="form-section">
        <h2 class="mb-4">Select Start and End DateTime</h2>
        <form method="post" class="mb-4">
            <div class="mb-3">
                <label for="start_datetime" class="form-label">Start Date & Time:</label>
                <input type="datetime-local" name="start_datetime" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="end_datetime" class="form-label">End Date & Time:</label>
                <input type="datetime-local" name="end_datetime" class="form-control" required>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Generate</button>
                {% if show_download %}
                <a href="/download" class="btn btn-success">Download</a>
                {% endif %}
            </div>
        </form>
    </div>

    {% if table %}
    <div class="results">
        <h4>Generated Data</h4>
        <div class="table-wrapper">
            {{ table | safe }}
        </div>
    </div>
    {% endif %}
</body>
</html>
