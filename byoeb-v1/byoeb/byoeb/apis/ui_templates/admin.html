<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Khushi Baby Admin</title>
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
            background: #faf9f8;
            color: #161514;
        }
        .page { min-height: 100vh; padding: 24px; }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: #fff;
            border: 1px solid #e1dfdd;
            box-shadow: 0 1.6px 3.6px rgba(0,0,0,0.132);
            border-radius: 4px;
            margin-bottom: 16px;
        }
        .header h1 { margin: 0; font-size: 18px; font-weight: 600; }
        .header small { color: #605e5c; font-size: 12px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
        .card {
            background: #fff;
            border: 1px solid #e1dfdd;
            border-radius: 4px;
            padding: 16px;
            box-shadow: 0 1.6px 3.6px rgba(0,0,0,0.132);
        }
        .card h2 { margin: 0 0 12px 0; font-size: 16px; }
        .field { margin-bottom: 12px; }
        .field label { display: block; margin-bottom: 6px; font-size: 13px; color: #605e5c; }
        .status { min-height: 18px; font-size: 12px; color: #605e5c; margin-top: 8px; }
        .list { margin-top: 8px; }
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e1dfdd;
            border-radius: 4px;
            padding: 8px 12px;
            margin-bottom: 8px;
            background: #faf9f8;
        }
        .row-meta { font-size: 12px; color: #605e5c; }
        .row-actions { display: flex; gap: 6px; }
        button {
            padding: 8px 16px;
            border: 1px solid transparent;
            border-radius: 4px;
            font-weight: 500;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.1s ease-in-out;
            background: #f3f2f1;
            color: #161514;
            border-color: #b3b0ad;
        }
        button.primary { background: #0078d4; color: #fff; border-color: #0078d4; }
        button.primary:hover { background: #106ebe; border-color: #106ebe; }
        button.danger { color: #d13438; border-color: #d13438; }
        button.danger:hover { background: #fde7e9; }
        input, select, textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #b3b0ad;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            background: white;
            color: #161514;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #0078d4;
            box-shadow: 0 0 0 1px #0078d4;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <div>
                <h1>Khushi Baby Admin</h1>
                <small id="tenantLabel">Tenant: —</small>
            </div>
            <div class="row-actions">
                <button id="refresh-btn">Refresh</button>
                <button id="logout-btn" class="danger">Sign Out</button>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>My Tenants</h2>
                <div id="tenants-list" class="list"></div>
            </div>

            <div class="card">
                <h2>Create Tenant</h2>
                <div class="field">
                    <label for="tenant-name">Tenant name</label>
                    <input id="tenant-name" type="text" placeholder="Example Tenant">
                </div>
                <button id="create-tenant-btn" class="primary">Create</button>
                <div id="tenant-status" class="status"></div>
            </div>

            <div class="card">
                <h2>Roles</h2>
                <div id="roles-list" class="list"></div>
            </div>

            <div class="card">
                <h2>Create Role</h2>
                <div class="field">
                    <label for="new-role">Role name</label>
                    <input id="new-role" type="text" placeholder="admin">
                </div>
                <div class="field">
                    <label for="new-perms">Permissions</label>
                    <select id="new-perms" multiple size="6">
                        {% for perm in permissions %}
                        <option value="{{ perm }}">{{ perm }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button id="create-role-btn" class="primary">Create Role</button>
                <div id="create-status" class="status"></div>
            </div>

            <div class="card">
                <h2>Edit Role Permissions</h2>
                <div class="field">
                    <label for="edit-role">Role</label>
                    <select id="edit-role"></select>
                </div>
                <div class="field">
                    <label for="edit-perms">Permissions</label>
                    <select id="edit-perms" multiple size="6">
                        {% for perm in permissions %}
                        <option value="{{ perm }}">{{ perm }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button id="save-role-btn" class="primary">Save</button>
                <div id="edit-status" class="status"></div>
            </div>

            <div class="card">
                <h2>User Roles</h2>
                <div class="field">
                    <label for="user-name">Username</label>
                    <input id="user-name" type="text" placeholder="muqsit">
                </div>
                <div class="field">
                    <label for="user-roles">Roles (comma-separated)</label>
                    <input id="user-roles" type="text" placeholder="admin, viewer">
                </div>
                <button id="set-roles-btn" class="primary">Set Roles</button>
                <div class="field" style="margin-top: 16px;">
                    <label for="single-role">Single role</label>
                    <input id="single-role" type="text" placeholder="viewer">
                </div>
                <div class="row-actions">
                    <button id="add-role-btn">Add Role</button>
                    <button id="remove-role-btn" class="danger">Remove Role</button>
                </div>
                <div id="user-status" class="status"></div>
            </div>

            <div class="card">
                <h2>User Tenant Membership</h2>
                <div class="field">
                    <label for="member-username">Username</label>
                    <input id="member-username" type="text" placeholder="muqsit">
                </div>
                <div class="field">
                    <label for="member-roles">Roles (comma-separated)</label>
                    <input id="member-roles" type="text" placeholder="admin">
                </div>
                <div class="row-actions">
                    <button id="add-member-btn">Add to Tenant</button>
                    <button id="remove-member-btn" class="danger">Remove from Tenant</button>
                </div>
                <div id="member-status" class="status"></div>
            </div>
        </div>
    </div>

    <script>
        const TENANT_KEY = 'asha_tenant_id';
        const tenantLabel = document.getElementById('tenantLabel');
        const rolesList = document.getElementById('roles-list');
        const tenantsList = document.getElementById('tenants-list');
        const editRoleSelect = document.getElementById('edit-role');
        const editPermsInput = document.getElementById('edit-perms');

        function getCookie(name) {
            const entry = document.cookie.split('; ').find(row => row.startsWith(`${name}=`));
            return entry ? decodeURIComponent(entry.split('=').slice(1).join('=')) : '';
        }

        function getAuthHeaders() {
            const tenantId = localStorage.getItem(TENANT_KEY);
            const csrfToken = getCookie('csrf_token');
            if (!tenantId || !csrfToken) {
                return null;
            }
            return { "X-Tenant-ID": tenantId, "X-CSRF-Token": csrfToken };
        }

        function requireAuth() {
            const headers = getAuthHeaders();
            if (!headers) {
                window.location.href = `/login?redirect=${encodeURIComponent('/admin')}`;
                return null;
            }
            tenantLabel.textContent = `Tenant: ${localStorage.getItem(TENANT_KEY)}`;
            return headers;
        }

        function parseList(value) {
            return value.split(',').map(v => v.trim()).filter(Boolean);
        }

        function getSelected(selectEl) {
            return Array.from(selectEl.selectedOptions).map(option => option.value);
        }

        async function loadTenants() {
            const headers = requireAuth();
            if (!headers) return;
            const response = await fetch('/auth/tenants', { headers, credentials: 'include' });
            if (!response.ok) return;
            const tenants = await response.json();
            tenantsList.innerHTML = '';
            tenants.forEach(tenant => {
                const item = document.createElement('div');
                item.className = 'row';
                item.innerHTML = `
                    <div>
                        <div><strong>${tenant.name || tenant.tenant_id}</strong></div>
                        <div class="row-meta">${tenant.tenant_id}</div>
                    </div>
                `;
                tenantsList.appendChild(item);
            });
        }

        async function loadRoles() {
            const headers = requireAuth();
            if (!headers) return;
            const response = await fetch('/auth/tenants/roles', { headers, credentials: 'include' });
            if (!response.ok) return;
            const roles = await response.json();
            rolesList.innerHTML = '';
            editRoleSelect.innerHTML = '';
            Object.keys(roles).sort().forEach(role => {
                const item = document.createElement('div');
                item.className = 'row';
                item.innerHTML = `
                    <div>
                        <div><strong>${role}</strong></div>
                        <div class="row-meta">${roles[role].join(', ')}</div>
                    </div>
                    <button class="danger" data-role="${role}">Delete</button>
                `;
                rolesList.appendChild(item);
                const opt = document.createElement('option');
                opt.value = role;
                opt.textContent = role;
                editRoleSelect.appendChild(opt);
            });
            if (editRoleSelect.value) {
                const selected = new Set(roles[editRoleSelect.value] || []);
                Array.from(editPermsInput.options).forEach(option => {
                    option.selected = selected.has(option.value);
                });
            }
            rolesList.querySelectorAll('button[data-role]').forEach(btn => {
                btn.addEventListener('click', () => deleteRole(btn.dataset.role));
            });
            editRoleSelect.addEventListener('change', () => {
                const selected = new Set(roles[editRoleSelect.value] || []);
                Array.from(editPermsInput.options).forEach(option => {
                    option.selected = selected.has(option.value);
                });
            });
        }

        async function createTenant() {
            const name = document.getElementById('tenant-name').value.trim();
            const statusEl = document.getElementById('tenant-status');
            statusEl.textContent = 'Creating...';
            const headers = requireAuth();
            if (!headers) return;
            const response = await fetch('/auth/tenants', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', ...headers },
                body: JSON.stringify({ name }),
                credentials: 'include'
            });
            statusEl.textContent = response.ok ? 'Tenant created.' : 'Failed to create tenant.';
            await loadTenants();
        }

        async function createRole() {
            const role = document.getElementById('new-role').value.trim();
            const permissions = getSelected(document.getElementById('new-perms'));
            const statusEl = document.getElementById('create-status');
            statusEl.textContent = 'Saving...';
            const headers = requireAuth();
            if (!headers) return;
            const response = await fetch('/auth/tenants/roles', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', ...headers },
                body: JSON.stringify({ role, permissions }),
                credentials: 'include'
            });
            statusEl.textContent = response.ok ? 'Role created.' : 'Failed to create role.';
            await loadRoles();
        }

        async function updateRole() {
            const role = editRoleSelect.value;
            const permissions = getSelected(editPermsInput);
            const statusEl = document.getElementById('edit-status');
            statusEl.textContent = 'Saving...';
            const headers = requireAuth();
            if (!headers) return;
            const response = await fetch(`/auth/tenants/roles/${encodeURIComponent(role)}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', ...headers },
                body: JSON.stringify(permissions),
                credentials: 'include'
            });
            statusEl.textContent = response.ok ? 'Role updated.' : 'Failed to update role.';
            await loadRoles();
        }

        async function deleteRole(role) {
            const headers = requireAuth();
            if (!headers) return;
            await fetch(`/auth/tenants/roles/${encodeURIComponent(role)}`, {
                method: 'DELETE',
                headers,
                credentials: 'include'
            });
            await loadRoles();
        }

        async function setUserRoles() {
            const username = document.getElementById('user-name').value.trim();
            const roles = parseList(document.getElementById('user-roles').value);
            const statusEl = document.getElementById('user-status');
            statusEl.textContent = 'Saving...';
            const headers = requireAuth();
            if (!headers) return;
            const response = await fetch('/auth/users/roles', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', ...headers },
                body: JSON.stringify({ username, roles }),
                credentials: 'include'
            });
            statusEl.textContent = response.ok ? 'User roles updated.' : 'Failed to update user roles.';
        }

        async function addUserRole() {
            const username = document.getElementById('user-name').value.trim();
            const role = document.getElementById('single-role').value.trim();
            const statusEl = document.getElementById('user-status');
            statusEl.textContent = 'Saving...';
            const headers = requireAuth();
            if (!headers) return;
            const response = await fetch('/auth/users/roles', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', ...headers },
                body: JSON.stringify({ username, role }),
                credentials: 'include'
            });
            statusEl.textContent = response.ok ? 'Role added.' : 'Failed to add role.';
        }

        async function removeUserRole() {
            const username = document.getElementById('user-name').value.trim();
            const role = document.getElementById('single-role').value.trim();
            const statusEl = document.getElementById('user-status');
            statusEl.textContent = 'Saving...';
            const headers = requireAuth();
            if (!headers) return;
            const response = await fetch('/auth/users/roles', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json', ...headers },
                body: JSON.stringify({ username, role }),
                credentials: 'include'
            });
            statusEl.textContent = response.ok ? 'Role removed.' : 'Failed to remove role.';
        }

        async function addUserTenant() {
            const username = document.getElementById('member-username').value.trim();
            const roles = parseList(document.getElementById('member-roles').value);
            const statusEl = document.getElementById('member-status');
            statusEl.textContent = 'Saving...';
            const headers = requireAuth();
            if (!headers) return;
            const response = await fetch('/auth/users/tenants', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', ...headers },
                body: JSON.stringify({ username, roles }),
                credentials: 'include'
            });
            statusEl.textContent = response.ok ? 'User added to tenant.' : 'Failed to add user.';
        }

        async function removeUserTenant() {
            const username = document.getElementById('member-username').value.trim();
            const statusEl = document.getElementById('member-status');
            statusEl.textContent = 'Saving...';
            const headers = requireAuth();
            if (!headers) return;
            const response = await fetch('/auth/users/tenants', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json', ...headers },
                body: JSON.stringify({ username }),
                credentials: 'include'
            });
            statusEl.textContent = response.ok ? 'User removed from tenant.' : 'Failed to remove user.';
        }

        document.getElementById('refresh-btn').addEventListener('click', async () => {
            await loadTenants();
            await loadRoles();
        });
        document.getElementById('logout-btn').addEventListener('click', async () => {
            const headers = getAuthHeaders();
            if (headers) await fetch('/auth/logout', { method: 'POST', headers, credentials: 'include' });
            localStorage.removeItem(TENANT_KEY);
            window.location.href = `/login?redirect=${encodeURIComponent('/admin')}`;
        });
        document.getElementById('create-tenant-btn').addEventListener('click', createTenant);
        document.getElementById('create-role-btn').addEventListener('click', createRole);
        document.getElementById('save-role-btn').addEventListener('click', updateRole);
        document.getElementById('set-roles-btn').addEventListener('click', setUserRoles);
        document.getElementById('add-role-btn').addEventListener('click', addUserRole);
        document.getElementById('remove-role-btn').addEventListener('click', removeUserRole);
        document.getElementById('add-member-btn').addEventListener('click', addUserTenant);
        document.getElementById('remove-member-btn').addEventListener('click', removeUserTenant);

        window.addEventListener('DOMContentLoaded', async () => {
            await loadTenants();
            await loadRoles();
        });
    </script>
</body>
</html>
