        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: "Segoe UI", "Roboto", "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-wash);
            color: var(--ink);
        }
        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: var(--bg-wash);
        }
        .card {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
        }
        .brand {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
        }
        .brand-logo {
            width: 52px;
            height: 52px;
            border-radius: 8px;
            background: var(--logo-image) center/cover no-repeat;
            border: 1px solid var(--border);
            flex-shrink: 0;
        }
        h1 {
            margin: 2px 0 4px 0;
            font-size: 20px;
            font-weight: 600;
        }
        p {
            margin: 0;
            font-size: 13px;
            color: var(--muted);
            line-height: 1.5;
        }
        .panel {
            border-radius: 4px;
            border: 1px solid var(--border);
            padding: 16px;
            background: #fff;
        }
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 8px 10px 8px 32px;
            border: 1px solid #b3b0ad;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            background: #fff;
            color: var(--ink);
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 0 1px var(--brand);
        }
        .field {
            margin-bottom: 16px;
        }
        button {
            padding: 10px 16px;
            border: 1px solid var(--brand);
            border-radius: 4px;
            font-weight: 500;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.1s ease-in-out;
            background: var(--brand);
            color: #fff;
            width: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        button:hover {
            background: var(--brand-2);
            border-color: var(--brand-2);
        }
        .status {
            margin-top: 14px;
            font-size: 12px;
            color: var(--muted);
            min-height: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status::before {
            content: "\f05a";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            color: var(--brand);
        }
        .status:empty {
            display: none;
        }
        .tenant-section {
            margin-top: 12px;
            display: none;
            border-top: 1px dashed var(--border);
            padding-top: 12px;
        }
        .tenant-section.active {
            display: block;
        }
        .tenant-roles {
            margin-top: 6px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
            font-size: 11px;
            color: var(--muted);
        }
        .tenant-roles-label {
            font-weight: 600;
            color: var(--ink);
        }
        .tenant-role {
            padding: 2px 8px;
            border-radius: 999px;
            background: var(--bg-deep);
            border: 1px solid var(--border);
            color: var(--ink);
            font-size: 11px;
        }
        .tenant-actions {
            margin-top: 8px;
        }
        @media (max-width: 520px) {
            .card {
                padding: 22px;
            }
            .brand-logo {
                width: 48px;
                height: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="card">
            <div class="brand">
                <div class="brand-logo" role="img" aria-label="Khushi Baby ASHABot logo"></div>
                <div>
                    <h1>Khushi Baby ASHABot</h1>
                    <p>Sign in to continue.</p>
                </div>
            </div>
            <div class="panel">
                <form id="login-form">
                    <div class="field">
                        <label for="username">Username</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-user"></i>
                            <input id="username" name="username" type="text" autocomplete="username" required>
                        </div>
                    </div>
                    <div class="field">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input id="password" name="password" type="password" autocomplete="current-password" required>
                        </div>
                    </div>
                    <button id="login-btn" type="submit"><i class="fa-solid fa-right-to-bracket"></i> Sign In</button>
                </form>
                <div id="tenant-section" class="tenant-section">
                    <div class="field">
                        <label for="tenant-select">Choose Tenant</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-building"></i>
                            <select id="tenant-select"></select>
                        </div>
                        <div id="tenant-roles" class="tenant-roles"></div>
                    </div>
                    <div class="tenant-actions">
                        <button id="tenant-btn" type="button"><i class="fa-solid fa-arrow-right"></i> Continue</button>
                    </div>
                </div>
                <div id="status" class="status"></div>
            </div>
        </div>
    </div>

    <script>
        const TENANT_KEY = 'asha_tenant_id';
        const form = document.getElementById('login-form');
        const statusEl = document.getElementById('status');
        const tenantSection = document.getElementById('tenant-section');
        const tenantSelect = document.getElementById('tenant-select');
        const tenantRoles = document.getElementById('tenant-roles');
        const tenantBtn = document.getElementById('tenant-btn');
        const loginBtn = document.getElementById('login-btn');

        let cachedUsername = '';
        let cachedPassword = '';
        let redirectTo = '/asha_logs';
        let oauthMode = false;
        let oauthParams = {};
        let tenantRoleMap = {};

        function setStatus(message) {
            statusEl.textContent = message;
        }

        function renderTenantRoles(tenantId) {
            const roles = tenantRoleMap[tenantId] || [];
            if (!roles.length) {
                tenantRoles.innerHTML = '<span class="tenant-roles-label">Roles:</span><span>No roles assigned</span>';
                return;
            }
            tenantRoles.innerHTML = `<span class="tenant-roles-label">Roles:</span>${roles.map(r => `<span class="tenant-role">${r}</span>`).join('')}`;
        }

        function setRedirectTarget() {
            const params = new URLSearchParams(window.location.search);
            redirectTo = params.get('redirect') || '/asha_logs';
            const paramKeys = ['response_type', 'client_id', 'redirect_uri', 'state', 'scope', 'code_challenge', 'code_challenge_method', 'resource', 'auth_path'];
            oauthParams = {};
            paramKeys.forEach(key => {
                const value = params.get(key);
                if (value) {
                    oauthParams[key] = value;
                }
            });
            oauthMode = !!oauthParams.client_id;
        }

        function storeTenant(tenantId) {
            localStorage.setItem(TENANT_KEY, tenantId);
        }

        function redirect() {
            window.location.href = redirectTo;
        }

        async function fetchToken(username, password, tenantId) {
            const body = new URLSearchParams({ username, password });
            const headers = { "Content-Type": "application/x-www-form-urlencoded" };
            if (tenantId) {
                headers["X-Tenant-ID"] = tenantId;
            }
            const response = await fetch('/auth/token/issue', { method: 'POST', headers, body, credentials: 'include' });
            return response.ok;
        }

        async function fetchTenants() {
            const response = await fetch('/auth/tenants', { credentials: 'include' });
            if (!response.ok) {
                return [];
            }
            return await response.json();
        }

        async function handleLogin(event) {
            event.preventDefault();
            tenantSection.classList.remove('active');
            setStatus('Signing in...');
            loginBtn.disabled = true;
            cachedUsername = document.getElementById('username').value.trim();
            cachedPassword = document.getElementById('password').value;

            const issued = await fetchToken(cachedUsername, cachedPassword, null);
            if (!issued) {
                setStatus('Login failed. Check username/password.');
                loginBtn.disabled = false;
                return;
            }
            const tenants = await fetchTenants();
            if (!tenants.length) {
                setStatus('No tenants found for this user.');
                loginBtn.disabled = false;
                return;
            }
            if (tenants.length === 1) {
                if (oauthMode) {
                    await finalizeOAuth(tenants[0].tenant_id);
                } else {
                    storeTenant(tenants[0].tenant_id);
                    redirect();
                }
                return;
            }
            tenantRoleMap = Object.fromEntries(tenants.map(t => [t.tenant_id, t.roles || []]));
            tenantSelect.innerHTML = tenants.map(t => {
                const label = t.name || t.tenant_id;
                return `<option value="${t.tenant_id}">${label}</option>`;
            }).join('');
            renderTenantRoles(tenantSelect.value);
            tenantSection.classList.add('active');
            setStatus('Select a tenant to continue.');
        }

        async function handleTenantSelect() {
            const tenantId = tenantSelect.value;
            if (!tenantId) {
                setStatus('Please select a tenant.');
                return;
            }
            setStatus('Signing in...');
            const issued = await fetchToken(cachedUsername, cachedPassword, tenantId);
            if (!issued) {
                setStatus('Login failed. Check username/password.');
                return;
            }
            if (oauthMode) {
                await finalizeOAuth(tenantId);
            } else {
                storeTenant(tenantId);
                redirect();
            }
        }

        function setHiddenField(name, value) {
            let input = form.querySelector(`input[name=\"${name}\"]`);
            if (!input) {
                input = document.createElement('input');
                input.type = 'hidden';
                input.name = name;
                form.appendChild(input);
            }
            input.value = value;
        }

        async function finalizeOAuth(tenantId) {
            setStatus('Completing authorization...');
            form.action = oauthParams.auth_path || '/authorize';
            form.method = 'POST';
            setHiddenField('tenant_id', tenantId);
            Object.entries(oauthParams).forEach(([key, value]) => setHiddenField(key, value));
            form.submit();
        }

        form.addEventListener('submit', handleLogin);
        tenantBtn.addEventListener('click', handleTenantSelect);
        tenantSelect.addEventListener('change', () => renderTenantRoles(tenantSelect.value));
        window.addEventListener('DOMContentLoaded', setRedirectTarget);
    </script>
</body>
</html>
