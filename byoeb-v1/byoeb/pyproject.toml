[tool.poetry]
name = "byoeb"
version = "0.1.0"
description = ""
authors = ["Rahul Sharma <rahul5982439@gmail.com>"]
readme = "README.md"
exclude = ["**/tests/**", "**/tests"]

[tool.poetry.dependencies]
python = "^3.10"
fastapi = "^0.115.5"
aiocache = "0.12.3"
byoeb-integrations = {git = "https://github.com/KhushiBaby/byoeb.git", branch = "rash598/reboot_ashabotv1_dev", subdirectory = "byoeb-v1/byoeb-integrations"}
azure-monitor-opentelemetry = "1.6.7"
azure-monitor-events-extension = "0.1.0"
notebook = "7.3.3"
croniter = "6.0.0"
rapidfuzz = "3.13.0"
python-multipart = "0.0.20"
openpyxl = "3.1.5"
pytest-mock = "^3.14.1"

[tool.poetry.group.dev.dependencies]
pytest = "^8.3.3"
coverage = {extras = ["toml"], version = "^7.10.5"}
pytest-asyncio = "^1.1.0"
pytest-cov = "^6.2.1"

[tool.coverage.run]
branch = true
source = ["byoeb"]

[tool.coverage.report]
show_missing = true
skip_covered = true
fail_under = 0
omit = [
  "byoeb/**/tests/**",
  "byoeb/**/__init__.py",
]

[tool.pytest.ini_options]
addopts = "--cov=byoeb --cov-branch --cov-report=term-missing:skip-covered --cov-report=xml:coverage.xml --cov-report=html"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
